<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex — Calendário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface  : #f9f7f4;
      --header   : #1a1a1d;
      --gold     : #C9A43A;
      --gold-dim : rgba(201,164,58,0.14);
      --brown    : #7a5c2e;
      --text     : #1a1a1d;
      --muted    : #6b6660;
      --border   : #e8e2d9;
      --card     : #ffffff;
      --radius   : 10px;
      --shadow   : 0 2px 16px rgba(26,26,29,0.08);

      /* Calendar-specific */
      --cal-online         : #1a2f5e;
      --cal-online-text    : #ffffff;
      --cal-inperson       : #C9A84C;
      --cal-inperson-text  : #000000;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Bilingual toggle ──────────────────────────────────────────────── */
    body.lang-pt .show-en { display: none; }
    body.lang-en .show-pt { display: none; }

    /* ─── Header ────────────────────────────────────────────────────────── */
    #appHeader {
      background: var(--header);
      height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    .role-badge {
      background: var(--gold-dim);
      border: 1px solid rgba(201,164,58,0.4);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .btn-header {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.75);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-header:hover { border-color: rgba(255,255,255,0.45); color: #fff; }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lang-btn:hover { background: var(--gold-dim); }

    /* ─── Loading screen ─────────────────────────────────────────────────── */
    #loadingScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }
    #loadingScreen[hidden] { display: none !important; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── App main ───────────────────────────────────────────────────────── */
    #appMain {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── Page header row ────────────────────────────────────────────────── */
    .page-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    /* ─── New Session button ─────────────────────────────────────────────── */
    .btn-new-session {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-new-session:hover { opacity: 0.88; }

    /* ─── Calendar toolbar ────────────────────────────────────────────────── */
    .cal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* View toggle pills */
    .view-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card);
    }

    .view-toggle-btn {
      background: transparent;
      border: none;
      padding: 7px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .view-toggle-btn + .view-toggle-btn { border-left: 1px solid var(--border); }
    .view-toggle-btn.active { background: var(--gold); color: #000; }
    .view-toggle-btn:not(.active):hover { background: var(--surface); color: var(--text); }

    /* Month navigation */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .month-nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: border-color 0.12s, color 0.12s;
      font-size: 16px;
    }
    .month-nav-btn:hover { border-color: var(--gold); color: var(--gold); }

    .month-nav-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      min-width: 160px;
      text-align: center;
    }

    /* ─── Calendar grid (month view) ─────────────────────────────────────── */
    .cal-grid-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cal-day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .cal-day-header {
      padding: 10px 8px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-cell {
      min-height: 100px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 6px;
      cursor: pointer;
      transition: background 0.1s;
      vertical-align: top;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.other-month { background: #fafaf9; }
    .cal-cell:hover { background: #f6f4f0; }
    .cal-cell.today .cal-day-num {
      color: var(--gold);
      border-bottom: 2px solid var(--gold);
      font-weight: 700;
    }

    .cal-day-num {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.6;
      padding-bottom: 1px;
    }
    .cal-cell.other-month .cal-day-num { color: #ccc; }

    /* Session chips in month cells */
    .cal-chip {
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      line-height: 1.4;
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .cal-chip.online    { background: var(--cal-online);   color: var(--cal-online-text); }
    .cal-chip.inperson  { background: var(--cal-inperson); color: var(--cal-inperson-text); }
    .cal-chip:hover { opacity: 0.88; }

    .cal-chip-name { font-weight: 600; }
    .cal-chip-time { font-weight: 400; font-size: 10px; }

    /* ─── Week view ──────────────────────────────────────────────────────── */
    .cal-week-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .cal-week-grid {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      min-width: 600px;
    }

    .cal-week-header-row {
      display: contents;
    }

    .cal-week-time-gutter {
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    .cal-week-day-head {
      padding: 10px 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .cal-week-day-head.today { color: var(--gold); }
    .cal-week-day-head:last-child { border-right: none; }

    .cal-week-time-label {
      padding: 4px 6px 0;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      min-height: 52px;
    }

    .cal-week-slot {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      padding: 3px;
      position: relative;
    }
    .cal-week-slot:last-child { border-right: none; }
    .cal-week-slot:hover { background: #f6f4f0; }

    .cal-week-chip {
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 11px;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .cal-week-chip.online   { background: var(--cal-online);   color: var(--cal-online-text); }
    .cal-week-chip.inperson { background: var(--cal-inperson); color: var(--cal-inperson-text); }
    .cal-week-chip:hover { opacity: 0.88; }

    /* ─── Day view ───────────────────────────────────────────────────────── */
    .cal-day-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .cal-day-grid {
      display: grid;
      grid-template-columns: 52px 1fr;
    }

    .cal-day-head-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 52px 1fr;
    }

    .cal-day-head-label {
      padding: 10px 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      grid-column: 2;
    }
    .cal-day-head-label.today { color: var(--gold); }

    .cal-day-time-label {
      padding: 4px 6px 0;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      min-height: 52px;
    }

    .cal-day-slot {
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      padding: 4px 8px;
    }
    .cal-day-slot:hover { background: #f6f4f0; }

    .cal-day-chip {
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 3px;
      display: block;
    }
    .cal-day-chip.online   { background: var(--cal-online);   color: var(--cal-online-text); }
    .cal-day-chip.inperson { background: var(--cal-inperson); color: var(--cal-inperson-text); }
    .cal-day-chip:hover { opacity: 0.88; }

    /* ─── Empty state ────────────────────────────────────────────────────── */
    .cal-empty {
      padding: 52px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      grid-column: 1 / -1;
    }

    /* ─── Status badge ───────────────────────────────────────────────────── */
    .status-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge[data-status="scheduled"]  { background: #dce8fd; color: #1a4a8a; }
    .status-badge[data-status="completed"]  { background: #ddfaec; color: #1a6640; }
    .status-badge[data-status="cancelled"]  { background: #f3e8ff; color: #6b21a8; }
    .status-badge[data-status="pending"]    { background: #fdf3dc; color: #8a6200; }
    body.lang-pt .status-badge[data-status="scheduled"]::before  { content: "Agendado"; }
    body.lang-pt .status-badge[data-status="completed"]::before  { content: "Concluído"; }
    body.lang-pt .status-badge[data-status="cancelled"]::before  { content: "Cancelado"; }
    body.lang-pt .status-badge[data-status="pending"]::before    { content: "Pendente"; }
    body.lang-en .status-badge[data-status="scheduled"]::before  { content: "Scheduled"; }
    body.lang-en .status-badge[data-status="completed"]::before  { content: "Completed"; }
    body.lang-en .status-badge[data-status="cancelled"]::before  { content: "Cancelled"; }
    body.lang-en .status-badge[data-status="pending"]::before    { content: "Pending"; }

    /* ─── Session type badge ─────────────────────────────────────────────── */
    .type-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .type-pill.online   { background: var(--cal-online);   color: var(--cal-online-text); }
    .type-pill.inperson { background: var(--cal-inperson); color: var(--cal-inperson-text); }

    /* ─── Toast ──────────────────────────────────────────────────────────── */
    #calToast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1d;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #calToast.visible { opacity: 1; }

    /* ─── Modals ─────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,29,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-overlay[hidden] { display: none !important; }

    .modal-box {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 8px 48px rgba(26,26,29,0.22);
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 1;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }

    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      color: var(--muted);
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-group { margin-bottom: 0; }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .field-group input,
    .field-group textarea,
    .field-group select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 11px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .field-group input:focus,
    .field-group textarea:focus,
    .field-group select:focus { outline: none; border-color: var(--gold); }
    .field-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field-group select { appearance: none; -webkit-appearance: none; cursor: pointer; background: var(--card); }

    /* Session type pill toggle in modal */
    .type-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card);
    }
    .type-toggle-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .type-toggle-btn + .type-toggle-btn { border-left: 1px solid var(--border); }
    .type-toggle-btn.active { background: var(--gold); color: #000; }

    /* Meet link field animate */
    .meet-info-wrap {
      overflow: hidden;
      transition: max-height 0.25s ease;
      max-height: 60px;
    }
    .meet-info-wrap.hidden-field { max-height: 0; }

    .meet-info-text {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      padding: 7px 10px;
      background: var(--surface);
      border-radius: 6px;
    }

    /* Submit / cancel */
    .btn-submit {
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 7px;
      padding: 11px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-submit:hover    { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.42; cursor: not-allowed; }

    .btn-cancel-link {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      text-align: center;
      width: 100%;
    }

    .pull-status {
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }
    .pull-status.is-error { color: #b44040; }
    .pull-status.is-ok    { color: #1a6640; }

    /* ─── Session detail modal specifics ────────────────────────────────── */
    .detail-client-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .detail-row-label {
      min-width: 70px;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-row-val {
      color: var(--text);
    }

    .detail-meet-link {
      color: var(--gold);
      text-decoration: none;
      word-break: break-all;
    }
    .detail-meet-link:hover { text-decoration: underline; }

    .detail-notes-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
    }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-whatsapp:hover    { opacity: 0.88; }
    .btn-whatsapp:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-close-detail {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      padding: 10px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-close-detail:hover { border-color: var(--text); color: var(--text); }

    /* ─── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      #appMain { padding: 12px 14px; }
      .cal-cell { min-height: 60px; }
      .month-nav-label { min-width: 120px; font-size: 14px; }
    }
  </style>
</head>
<body class="lang-pt">

  <!-- ═══════════════ HEADER ═══════════════════════════════════════════════ -->
  <header id="appHeader">
    <div class="header-right">
      <div class="user-pill">
        <span id="headerEmail"></span>
        <span class="role-badge" id="headerRole"></span>
      </div>
      <button class="lang-btn" onclick="apexNavToggleLang()">
        <span class="show-pt">EN</span>
        <span class="show-en">PT</span>
      </button>
      <button class="btn-header" onclick="handleSignOut()">
        <span class="show-pt">Sair</span>
        <span class="show-en">Sign out</span>
      </button>
    </div>
  </header>

  <div id="pageWrapper">
    <div id="navSidebar"></div>
    <div id="contentArea">

  <!-- ═══════════════ LOADING SCREEN ═══════════════════════════════════════ -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <span class="show-pt">Carregando...</span>
    <span class="show-en">Loading...</span>
  </div>

  <!-- ═══════════════ MAIN ═════════════════════════════════════════════════ -->
  <main id="appMain" hidden>

    <!-- Page heading -->
    <div class="page-header-row">
      <h1 class="page-heading">
        <span class="show-pt">Calendário</span>
        <span class="show-en">Calendar</span>
      </h1>
      <button class="btn-new-session" onclick="openNewSessionModal()">
        + <span class="show-pt">Nova Sessão</span>
        <span class="show-en">New Session</span>
      </button>
    </div>

    <!-- Calendar toolbar -->
    <div class="cal-toolbar">
      <!-- View toggle -->
      <div class="view-toggle">
        <button class="view-toggle-btn active" id="viewBtnMonth" onclick="setCalView('month')">
          <span class="show-pt">Mês</span>
          <span class="show-en">Month</span>
        </button>
        <button class="view-toggle-btn" id="viewBtnWeek" onclick="setCalView('week')">
          <span class="show-pt">Semana</span>
          <span class="show-en">Week</span>
        </button>
        <button class="view-toggle-btn" id="viewBtnDay" onclick="setCalView('day')">
          <span class="show-pt">Dia</span>
          <span class="show-en">Day</span>
        </button>
      </div>

      <!-- Month/week/day navigation -->
      <div class="month-nav">
        <button class="month-nav-btn" onclick="navPrev()">&#8249;</button>
        <div class="month-nav-label" id="navLabel"></div>
        <button class="month-nav-btn" onclick="navNext()">&#8250;</button>
      </div>
    </div>

    <!-- Calendar content area -->
    <div id="calendarContent">
      <!-- Rendered by JS -->
    </div>

  </main><!-- /appMain -->

    </div><!-- /contentArea -->
  </div><!-- /pageWrapper -->

  <!-- ─── Toast ─────────────────────────────────────────────────────────── -->
  <div id="calToast"></div>

  <!-- ═══════════════ MODAL: Nova Sessão ═══════════════════════════════════ -->
  <div id="modalNewSession" class="modal-overlay" hidden>
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>
          <span class="show-pt">Nova Sessão</span>
          <span class="show-en">New Session</span>
        </h3>
        <button class="modal-close" onclick="closeModal('modalNewSession')">×</button>
      </div>
      <div class="modal-body">
        <!-- Client dropdown -->
        <div class="field-group">
          <div class="field-label">
            <span class="show-pt">Cliente</span>
            <span class="show-en">Client</span>
          </div>
          <select id="nsClient">
            <option value="">
              <span class="show-pt">— selecionar —</span>
              <span class="show-en">— select —</span>
            </option>
          </select>
        </div>
        <!-- Date -->
        <div class="field-group">
          <div class="field-label">
            <span class="show-pt">Data</span>
            <span class="show-en">Date</span>
          </div>
          <input type="date" id="nsDate">
        </div>
        <!-- Time -->
        <div class="field-group">
          <div class="field-label">
            <span class="show-pt">Hora</span>
            <span class="show-en">Time</span>
          </div>
          <input type="time" id="nsTime">
        </div>
        <!-- Session type toggle -->
        <div class="field-group">
          <div class="field-label">
            <span class="show-pt">Tipo</span>
            <span class="show-en">Type</span>
          </div>
          <div class="type-toggle">
            <button class="type-toggle-btn active" id="nsTypeMeet" onclick="setNewSessionType('meet')">Google Meet</button>
            <button class="type-toggle-btn" id="nsTypeInPerson" onclick="setNewSessionType('inperson')">
              <span class="show-pt">Presencial</span>
              <span class="show-en">In-Person</span>
            </button>
          </div>
          <input type="hidden" id="nsTypeVal" value="meet">
          <div class="meet-info-wrap" id="nsMeetInfoWrap" style="margin-top:8px;">
            <div class="meet-info-text">
              <span class="show-pt">Link do Meet será gerado automaticamente.</span>
              <span class="show-en">Meet link will be generated automatically.</span>
            </div>
          </div>
        </div>
        <!-- Notes -->
        <div class="field-group">
          <div class="field-label">
            <span class="show-pt">Notas (opcional)</span>
            <span class="show-en">Notes (optional)</span>
          </div>
          <textarea id="nsNotes" placeholder="..."></textarea>
        </div>
        <!-- Submit -->
        <button class="btn-submit" id="btnNsSubmit" onclick="handleNewSession()">
          <span class="show-pt">Agendar</span>
          <span class="show-en">Schedule</span>
        </button>
        <button class="btn-cancel-link" onclick="closeModal('modalNewSession')">
          <span class="show-pt">Cancelar</span>
          <span class="show-en">Cancel</span>
        </button>
        <div class="pull-status" id="nsStatus"></div>
      </div>
    </div>
  </div>

      <div class="modal-body">

        <div class="detail-row">

            <span class="show-en">Date</span>

          <span class="detail-row-val" id="detailDate"></span>
        </div>

        <div class="detail-row">
          <span class="detail-row-label">
            <span class="show-pt">Hora</span>

          <span class="detail-row-val" id="detailTime"></span>

        <div class="detail-row">

  <!-- ═══════════════ FIREBASE + SCRIPT ════════════════════════════════════ -->
  <script src="nav.js"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"
    integrity="sha384-5y/1XyjXGriVPCsfTI3ap84Bg9Db2y/GiQjR3nbrVJE03bworx9G08uSJEMme/mI"
    crossorigin="anonymous"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"
    integrity="sha384-EkqK+ezBWJuvO3hfrSx2iVqr3YQbhmnzn8kPhOpBZ+0GMVU5oGSgptwIu8D84HjE"
    crossorigin="anonymous"></script>

  <script>
    // ── Configuration ──────────────────────────────────────────────────────
    var WORKER_URL = "https://apex-api.farfromtimnah.workers.dev";

    var FIREBASE_CONFIG = {
      apiKey:            "AIzaSyB_OFg5ouKAu61vObNsHJaGQO0TikaIhy8",
      authDomain:        "apex-command-center-4b038.firebaseapp.com",
      projectId:         "apex-command-center-4b038",
      storageBucket:     "apex-command-center-4b038.firebasestorage.app",
      messagingSenderId: "894743550437",
      appId:             "1:894743550437:web:45041f841f7e8196db770c"
    };

    // ── State ──────────────────────────────────────────────────────────────
    var auth        = null;
    var currentUser = null;
    var calView     = "month";      // "month" | "week" | "day"
    var curDate     = new Date();   // anchor date for current view
    var calSessions = [];           // sessions from API
    var clients     = [];           // all clients for dropdown
    var activeDetailSession = null; // currently open detail session

    var MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    var MONTHS_EN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    var DAYS_PT   = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    var DAYS_EN   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    // ── Utilities ──────────────────────────────────────────────────────────

    function isEn() { return document.body.classList.contains("lang-en"); }

    function getToken() {
      if (!currentUser) { return Promise.reject(new Error("Not authenticated")); }
      return currentUser.getIdToken();
    }

    function apiFetch(path, opts) {
      return getToken().then(function(token) {
        var method    = (opts && opts.method) || "GET";
        var headers   = { "Authorization": "Bearer " + token };
        var fetchOpts = { method: method, headers: headers };
        if (opts && opts.body) {
          headers["Content-Type"] = "application/json";
          fetchOpts.body = JSON.stringify(opts.body);
        }
        return fetch(WORKER_URL + path, fetchOpts);
      });
    }

    function closeModal(id) {
      var el = document.getElementById(id);
      if (el) { el.hidden = true; }
    }

    function showToast(msg) {
      var t = document.getElementById("calToast");
      t.textContent = msg;
      t.classList.add("visible");
      setTimeout(function() { t.classList.remove("visible"); }, 2800);
    }

    function padZ(n) { return n < 10 ? "0" + n : "" + n; }

    function dateKey(d) {
      return d.getFullYear() + "-" + padZ(d.getMonth() + 1) + "-" + padZ(d.getDate());
    }

    function formatDisplayDate(dateStr) {
      if (!dateStr) { return "—"; }
      var p = dateStr.split("-");
      if (p.length !== 3) { return dateStr; }
      return p[2] + "/" + p[1] + "/" + p[0];
    }

    // ── Close modals on overlay click ──────────────────────────────────────
    document.addEventListener("click", function(e) {
      var modals = ["modalNewSession", "modalDetail"];
      for (var i = 0; i < modals.length; i++) {
        var el = document.getElementById(modals[i]);
        if (el && !el.hidden && e.target === el) { el.hidden = true; }
      }
    });

    // ── Auth & bootstrap ───────────────────────────────────────────────────

    function handleSignOut() {
      auth.signOut().then(function() {
        sessionStorage.removeItem("apex_role");
        sessionStorage.removeItem("apex_email");
        window.location.href = "index.html";
      });
    }

    function setupPage(role) {
      document.getElementById("headerEmail").textContent =
        sessionStorage.getItem("apex_email") || (currentUser ? currentUser.email : "");
      document.getElementById("headerRole").textContent = role;

      document.getElementById("loadingScreen").hidden = true;
      document.getElementById("appMain").hidden = false;

      window.initNav && window.initNav();
      loadClients();
      loadCalendar();
    }

    function init() {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();

      auth.onAuthStateChanged(function(user) {
        if (!user) { window.location.href = "index.html"; return; }
        currentUser = user;
        var cached = sessionStorage.getItem("apex_role");
        if (cached) {
          setupPage(cached);
        } else {
          getToken().then(function(token) {
            return fetch(WORKER_URL + "/api/role", { headers: { "Authorization": "Bearer " + token } });
          }).then(function(res) { return res.json(); })
            .then(function(data) {
              sessionStorage.setItem("apex_role",  data.role);
              sessionStorage.setItem("apex_email", data.email);
              setupPage(data.role);
            })
            .catch(function() { window.location.href = "index.html"; });
        }
      });
    }

    // ── Data loading ───────────────────────────────────────────────────────

    function loadClients() {
      apiFetch("/api/clients")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          clients = (data.clients || []).slice().sort(function(a, b) { return a.name.localeCompare(b.name); });
          populateClientDropdown();
        })
        .catch(function() {});
    }

    function populateClientDropdown() {
      var sel = document.getElementById("nsClient");
      if (!sel) { return; }
      var en = isEn();
      sel.innerHTML = '<option value="">' + (en ? "— select client —" : "— selecionar cliente —") + '</option>';
      for (var i = 0; i < clients.length; i++) {
        var opt = document.createElement("option");
        opt.value = clients[i].id;
        opt.textContent = clients[i].name;
        sel.appendChild(opt);
      }
    }

    function loadCalendar() {
      var monthStr = curDate.getFullYear() + "-" + padZ(curDate.getMonth() + 1);
      apiFetch("/api/sessions/calendar?month=" + monthStr)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          calSessions = data.sessions || [];
          renderCalendar();
        })
        .catch(function(e) {
          calSessions = [];
          renderCalendar();
        });
    }

    // ── View controls ──────────────────────────────────────────────────────

    function setCalView(v) {
      calView = v;
      document.getElementById("viewBtnMonth").className = "view-toggle-btn" + (v === "month" ? " active" : "");
      document.getElementById("viewBtnWeek").className  = "view-toggle-btn" + (v === "week"  ? " active" : "");
      document.getElementById("viewBtnDay").className   = "view-toggle-btn" + (v === "day"   ? " active" : "");
      renderCalendar();
    }

    function navPrev() {
      if (calView === "month") {
        curDate = new Date(curDate.getFullYear(), curDate.getMonth() - 1, 1);
        loadCalendar();
      } else if (calView === "week") {
        curDate = new Date(curDate.getTime() - 7 * 86400000);
        renderCalendar();
      } else {
        curDate = new Date(curDate.getTime() - 86400000);
        renderCalendar();
      }
    }

    function navNext() {
      if (calView === "month") {
        curDate = new Date(curDate.getFullYear(), curDate.getMonth() + 1, 1);
        loadCalendar();
      } else if (calView === "week") {
        curDate = new Date(curDate.getTime() + 7 * 86400000);
        renderCalendar();
      } else {
        curDate = new Date(curDate.getTime() + 86400000);
        renderCalendar();
      }
    }

    // ── Render dispatcher ──────────────────────────────────────────────────

    function renderCalendar() {
      updateNavLabel();
      if (calView === "month") { renderMonth(); }
      else if (calView === "week") { renderWeek(); }
      else { renderDay(); }
    }

    function updateNavLabel() {
      var label = document.getElementById("navLabel");
      var en    = isEn();
      if (calView === "month") {
        var months = en ? MONTHS_EN : MONTHS_PT;
        label.textContent = months[curDate.getMonth()] + " " + curDate.getFullYear();
      } else if (calView === "week") {
        var weekStart = getWeekStart(curDate);
        var weekEnd   = new Date(weekStart.getTime() + 6 * 86400000);
        var ms = en ? MONTHS_EN : MONTHS_PT;
        label.textContent = padZ(weekStart.getDate()) + " " + ms[weekStart.getMonth()].slice(0,3) +
          " – " + padZ(weekEnd.getDate()) + " " + ms[weekEnd.getMonth()].slice(0,3) + " " + weekEnd.getFullYear();
      } else {
        var ms2 = en ? MONTHS_EN : MONTHS_PT;
        label.textContent = padZ(curDate.getDate()) + " " + ms2[curDate.getMonth()] + " " + curDate.getFullYear();
      }
    }

    function getWeekStart(d) {
      var day = d.getDay();
      return new Date(d.getFullYear(), d.getMonth(), d.getDate() - day);
    }

    // ── Build session lookup by date ───────────────────────────────────────

    function buildSessionMap() {
      var map = {};
      for (var i = 0; i < calSessions.length; i++) {
        var s = calSessions[i];
        var k = s.date || "";
        if (!map[k]) { map[k] = []; }
        map[k].push(s);
      }
      return map;
    }

    // ── Month view ─────────────────────────────────────────────────────────

    function renderMonth() {
      var content = document.getElementById("calendarContent");
      var today   = new Date();
      today.setHours(0,0,0,0);
      var map = buildSessionMap();
      var en  = isEn();
      var days = en ? DAYS_EN : DAYS_PT;

      var firstOfMonth = new Date(curDate.getFullYear(), curDate.getMonth(), 1);
      var lastOfMonth  = new Date(curDate.getFullYear(), curDate.getMonth() + 1, 0);

      // Grid starts on Sunday of the week containing day 1
      var gridStart = new Date(firstOfMonth);
      gridStart.setDate(gridStart.getDate() - gridStart.getDay());

      var html = '<div class="cal-grid-wrap">';
      // Day headers
      html += '<div class="cal-day-headers">';
      for (var d = 0; d < 7; d++) {
        html += '<div class="cal-day-header">' + days[d] + '</div>';
      }
      html += '</div>';
      html += '<div class="cal-grid" id="monthGrid">';
      html += '</div></div>';

      content.innerHTML = html;

      var grid = document.getElementById("monthGrid");
      var cur  = new Date(gridStart);

      // Render up to 6 weeks
      for (var w = 0; w < 6; w++) {
        for (var dw = 0; dw < 7; dw++) {
          var isCurrentMonth = cur.getMonth() === curDate.getMonth();
          var isToday = cur.getTime() === today.getTime();
          var key = dateKey(cur);
          var sessions = map[key] || [];

          var cell = document.createElement("div");
          cell.className = "cal-cell" + (isCurrentMonth ? "" : " other-month") + (isToday ? " today" : "");

          var dayNum = document.createElement("div");
          dayNum.className = "cal-day-num";
          dayNum.textContent = cur.getDate();
          cell.appendChild(dayNum);

          // Session chips
          for (var si = 0; si < sessions.length; si++) {
            cell.appendChild(makeMonthChip(sessions[si]));
          }

          grid.appendChild(cell);
          cur = new Date(cur.getTime() + 86400000);
        }
        // Stop if we've passed the month and it's a complete row
        if (cur.getMonth() !== curDate.getMonth() && cur.getDay() === 0) { break; }
      }
    }

    function makeMonthChip(session) {
      var chip = document.createElement("div");
      var typeCls = (session.session_type === "inperson") ? "inperson" : "online";
      chip.className = "cal-chip " + typeCls;

      var nameSpan = document.createElement("span");
      nameSpan.className = "cal-chip-name";
      nameSpan.textContent = session.client_name || "—";
      chip.appendChild(nameSpan);

      if (session.time) {
        var timeSpan = document.createElement("span");
        timeSpan.className = "cal-chip-time";
        timeSpan.textContent = " " + session.time.slice(0,5);
        chip.appendChild(timeSpan);
      }

      (function(s) { chip.onclick = function(e) { e.stopPropagation(); openDetail(s); }; })(session);
      return chip;
    }

    // ── Week view ──────────────────────────────────────────────────────────

    var HOURS = [];
    (function() { for (var h = 7; h <= 21; h++) { HOURS.push(h); } })();

    function renderWeek() {
      var content   = document.getElementById("calendarContent");
      var today     = new Date();
      today.setHours(0,0,0,0);
      var weekStart = getWeekStart(curDate);
      var en        = isEn();
      var days      = en ? DAYS_EN : DAYS_PT;
      var months    = en ? MONTHS_EN : MONTHS_PT;
      var map       = buildSessionMap();

      var wrap = document.createElement("div");
      wrap.className = "cal-week-wrap";

      var grid = document.createElement("div");
      grid.className = "cal-week-grid";

      // Header row: time gutter + 7 day headers
      var gutterHead = document.createElement("div");
      gutterHead.className = "cal-week-time-gutter";
      gutterHead.style.borderBottom = "1px solid var(--border)";
      grid.appendChild(gutterHead);

      for (var d = 0; d < 7; d++) {
        var dayD = new Date(weekStart.getTime() + d * 86400000);
        var isTodayD = dayD.getTime() === today.getTime();
        var headEl = document.createElement("div");
        headEl.className = "cal-week-day-head" + (isTodayD ? " today" : "");
        headEl.textContent = days[d] + " " + padZ(dayD.getDate());
        grid.appendChild(headEl);
      }

      // Time slot rows
      for (var hi = 0; hi < HOURS.length; hi++) {
        var h = HOURS[hi];
        var timeLabel = document.createElement("div");
        timeLabel.className = "cal-week-time-label";
        timeLabel.textContent = padZ(h) + ":00";
        grid.appendChild(timeLabel);

        for (var dw = 0; dw < 7; dw++) {
          var slotDay  = new Date(weekStart.getTime() + dw * 86400000);
          var slotKey  = dateKey(slotDay);
          var slotSess = (map[slotKey] || []).filter(function(s) {
            if (!s.time) { return false; }
            var sh = parseInt(s.time.split(":")[0], 10);
            return sh === h;
          });

          var slot = document.createElement("div");
          slot.className = "cal-week-slot";

          for (var si = 0; si < slotSess.length; si++) {
            slot.appendChild(makeWeekChip(slotSess[si]));
          }
          grid.appendChild(slot);
        }
      }

      wrap.appendChild(grid);
      content.innerHTML = "";
      content.appendChild(wrap);

      // Check if no sessions exist this week
      var weekSessions = 0;
      for (var dd = 0; dd < 7; dd++) {
        var dk = dateKey(new Date(weekStart.getTime() + dd * 86400000));
        weekSessions += (map[dk] || []).length;
      }
      if (weekSessions === 0) {
        var emptyRow = document.createElement("div");
        emptyRow.className = "cal-empty";
        emptyRow.innerHTML =
          '<span class="show-pt">Nenhuma sessão agendada.</span>' +
          '<span class="show-en">No sessions scheduled.</span>';
        grid.appendChild(emptyRow);
      }
    }

    function makeWeekChip(session) {
      var chip = document.createElement("div");
      var typeCls = (session.session_type === "inperson") ? "inperson" : "online";
      chip.className = "cal-week-chip " + typeCls;
      chip.innerHTML = '<strong>' + escHtml(session.client_name || "—") + '</strong>';
      if (session.time) { chip.innerHTML += ' <span style="font-size:10px;opacity:0.85;">' + session.time.slice(0,5) + '</span>'; }
      (function(s) { chip.onclick = function() { openDetail(s); }; })(session);
      return chip;
    }

    // ── Day view ───────────────────────────────────────────────────────────

    function renderDay() {
      var content = document.getElementById("calendarContent");
      var today   = new Date();
      today.setHours(0,0,0,0);
      var isToday = curDate.getFullYear() === today.getFullYear() &&
                    curDate.getMonth()    === today.getMonth()    &&
                    curDate.getDate()     === today.getDate();
      var en     = isEn();
      var months = en ? MONTHS_EN : MONTHS_PT;
      var days   = en ? DAYS_EN : DAYS_PT;
      var map    = buildSessionMap();
      var key    = dateKey(curDate);
      var daySessions = map[key] || [];

      var wrap = document.createElement("div");
      wrap.className = "cal-day-wrap";

      var grid = document.createElement("div");
      grid.className = "cal-day-grid";

      // Day header spanning both columns
      var headGutter = document.createElement("div");
      headGutter.className = "cal-week-time-gutter";
      headGutter.style.borderBottom = "1px solid var(--border)";
      grid.appendChild(headGutter);

      var headLabel = document.createElement("div");
      headLabel.className = "cal-day-head-label" + (isToday ? " today" : "");
      headLabel.textContent = days[curDate.getDay()] + ", " + padZ(curDate.getDate()) + " " + months[curDate.getMonth()];
      grid.appendChild(headLabel);

      for (var hi = 0; hi < HOURS.length; hi++) {
        var h = HOURS[hi];
        var timeLabel = document.createElement("div");
        timeLabel.className = "cal-day-time-label";
        timeLabel.textContent = padZ(h) + ":00";
        grid.appendChild(timeLabel);

        var slotSess = daySessions.filter(function(s) {
          if (!s.time) { return false; }
          return parseInt(s.time.split(":")[0], 10) === h;
        });

        var slot = document.createElement("div");
        slot.className = "cal-day-slot";

        for (var si = 0; si < slotSess.length; si++) {
          slot.appendChild(makeDayChip(slotSess[si]));
        }
        grid.appendChild(slot);
      }

      wrap.appendChild(grid);
      content.innerHTML = "";
      content.appendChild(wrap);

      if (daySessions.length === 0) {
        var emptyEl = document.createElement("div");
        emptyEl.className = "cal-empty";
        emptyEl.innerHTML =
          '<span class="show-pt">Nenhuma sessão agendada.</span>' +
          '<span class="show-en">No sessions scheduled.</span>';
        grid.appendChild(emptyEl);
      }
    }

    function makeDayChip(session) {
      var chip = document.createElement("div");
      var typeCls = (session.session_type === "inperson") ? "inperson" : "online";
      chip.className = "cal-day-chip " + typeCls;
      chip.innerHTML = '<strong>' + escHtml(session.client_name || "—") + '</strong>';
      if (session.time) { chip.innerHTML += ' <span style="font-size:11px;opacity:0.85;font-weight:400;">' + session.time.slice(0,5) + '</span>'; }
      (function(s) { chip.onclick = function() { openDetail(s); }; })(session);
      return chip;
    }

    // ── New Session modal ──────────────────────────────────────────────────

    function openNewSessionModal() {
      populateClientDropdown();
      document.getElementById("nsClient").value = "";
      document.getElementById("nsDate").value   = "";
      document.getElementById("nsTime").value   = "";
      document.getElementById("nsNotes").value  = "";
      setNewSessionType("meet");
      var st = document.getElementById("nsStatus");
      if (st) { st.textContent = ""; st.className = "pull-status"; }
      document.getElementById("modalNewSession").hidden = false;
    }

    function setNewSessionType(type) {
      document.getElementById("nsTypeMeet").className     = "type-toggle-btn" + (type === "meet"     ? " active" : "");
      document.getElementById("nsTypeInPerson").className = "type-toggle-btn" + (type === "inperson" ? " active" : "");
      document.getElementById("nsTypeVal").value          = type;
      var wrap = document.getElementById("nsMeetInfoWrap");
      if (type === "meet") { wrap.classList.remove("hidden-field"); }
      else                 { wrap.classList.add("hidden-field"); }
    }

    function handleNewSession() {
      var clientId = document.getElementById("nsClient").value;
      var date     = document.getElementById("nsDate").value;
      var time     = document.getElementById("nsTime").value;
      var type     = document.getElementById("nsTypeVal").value || "meet";
      var notes    = document.getElementById("nsNotes").value;
      var statusEl = document.getElementById("nsStatus");
      var btn      = document.getElementById("btnNsSubmit");
      var en       = isEn();

      if (!clientId || !date || !time) {
        statusEl.textContent = en ? "Client, date and time are required." : "Cliente, data e hora são obrigatórios.";
        statusEl.className = "pull-status is-error";
        return;
      }

      btn.disabled = true;
      statusEl.textContent = en ? "Scheduling..." : "Agendando...";
      statusEl.className = "pull-status";

      apiFetch("/api/sessions/schedule", {
        method: "POST",
        body: { client_id: clientId, date: date, time: time, session_type: type, notes: notes || null }
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.error) { throw new Error(data.error); }
          btn.disabled = false;
          closeModal("modalNewSession");
          showToast(en ? "Session scheduled!" : "Sessão agendada!");
          loadCalendar();
        })
        .catch(function(e) {
          btn.disabled = false;
          statusEl.textContent = (en ? "Error: " : "Erro: ") + e.message;
          statusEl.className = "pull-status is-error";
        });
    }

    // ── Session Detail modal ───────────────────────────────────────────────

    function openDetail(session) {
      activeDetailSession = session;
      var en = isEn();

      document.getElementById("detailTitle").textContent     = session.client_name || "—";
      document.getElementById("detailClientName").textContent = session.client_name || "—";
      document.getElementById("detailDate").textContent      = formatDisplayDate(session.date);
      document.getElementById("detailTime").textContent      = session.time ? session.time.slice(0,5) : "—";

      var typePillEl = document.getElementById("detailTypePill");
      var typeCls = (session.session_type === "inperson") ? "inperson" : "online";
      var typeLabel;
      if (session.session_type === "inperson") {
        typeLabel = en ? "In-Person" : "Presencial";
      } else {
        typeLabel = "Google Meet";
      }
      typePillEl.innerHTML = '<span class="type-pill ' + typeCls + '">' + escHtml(typeLabel) + '</span>';

      var statusEl = document.getElementById("detailStatus");
      statusEl.setAttribute("data-status", session.status || "scheduled");

      var meetRow = document.getElementById("detailMeetRow");
      if (session.meet_link) {
        meetRow.hidden = false;
        var link = document.getElementById("detailMeetLink");
        link.href = safeUrl(session.meet_link);
        link.textContent = session.meet_link;
      } else {
        meetRow.hidden = true;
      }

      var notesRow = document.getElementById("detailNotesRow");
      if (session.notes) {
        notesRow.hidden = false;
        document.getElementById("detailNotes").textContent = session.notes;
      } else {
        notesRow.hidden = true;
      }

      // Reset WhatsApp button
      var waBtn = document.getElementById("btnWhatsApp");
      waBtn.disabled = false;
      waBtn.innerHTML = '<span class="show-pt">Enviar WhatsApp</span><span class="show-en">Send WhatsApp</span>';

      var st2 = document.getElementById("detailStatus2");
      if (st2) { st2.textContent = ""; st2.className = "pull-status"; }

      document.getElementById("modalDetail").hidden = false;
    }

    function handleWhatsApp() {
      if (!activeDetailSession) { return; }
      var en   = isEn();
      var btn  = document.getElementById("btnWhatsApp");
      var st2  = document.getElementById("detailStatus2");
      var id   = activeDetailSession.id;

      btn.disabled = true;
      if (st2) { st2.textContent = en ? "Sending..." : "Enviando..."; st2.className = "pull-status"; }

      apiFetch("/api/sessions/" + encodeURIComponent(id) + "/whatsapp", { method: "POST" })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.error) { throw new Error(data.error); }
          if (data.whatsapp_url) { window.open(data.whatsapp_url, "_blank"); }
          btn.innerHTML = '<span class="show-pt">Enviado ✓</span><span class="show-en">Sent ✓</span>';
          if (st2) { st2.textContent = ""; }
        })
        .catch(function(e) {
          btn.disabled = false;
          if (st2) { st2.textContent = (en ? "Error: " : "Erro: ") + e.message; st2.className = "pull-status is-error"; }
        });
    }

    // ── Utility ────────────────────────────────────────────────────────────

    function escHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function safeUrl(u) {
      try {
        var p = new URL(u);
        if (p.protocol === "https:" || p.protocol === "http:") { return p.href; }
      } catch(e) {}
      return "#";
    }

    // ── Bootstrap ──────────────────────────────────────────────────────────
    window.onload = function() { init(); };
  </script>

</body>
</html>
