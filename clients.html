<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex — Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface:  #f9f7f4;
      --header:   #1a1a1d;
      --gold:     #C9A43A;
      --gold-dim: rgba(201,164,58,0.14);
      --brown:    #7a5c2e;
      --text:     #1a1a1d;
      --muted:    #6b6660;
      --border:   #e8e2d9;
      --card:     #ffffff;
      --radius:   10px;
      --shadow:   0 2px 16px rgba(26,26,29,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Bilingual ───────────────────────────────────────────────────────── */
    body.lang-pt .show-en { display: none; }
    body.lang-en .show-pt { display: none; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    #appHeader {
      background: var(--header);
      height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }
    .logo-img { height: 32px; width: auto; display: block; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .user-pill { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.7); font-size: 13px; }
    .role-badge {
      background: var(--gold-dim); border: 1px solid rgba(201,164,58,0.4); color: var(--gold);
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
      padding: 2px 8px; border-radius: 10px;
    }
    .btn-header {
      background: transparent; border: 1.5px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.75); font-family: 'Inter', sans-serif; font-size: 12px;
      font-weight: 500; padding: 5px 13px; border-radius: 20px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-header:hover { border-color: rgba(255,255,255,0.45); color: #fff; }
    .lang-btn {
      background: transparent; border: 1.5px solid var(--gold); color: var(--gold);
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      padding: 5px 13px; border-radius: 20px; cursor: pointer; transition: background 0.15s;
    }
    .lang-btn:hover { background: var(--gold-dim); }

    /* ── Loading screen ──────────────────────────────────────────────────── */
    #loadingScreen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; color: var(--muted); font-size: 14px;
    }
    #loadingScreen[hidden] { display: none !important; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App main ────────────────────────────────────────────────────────── */
    #appMain {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Page header ─────────────────────────────────────────────────────── */
    .page-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Clients card ────────────────────────────────────────────────────── */
    .content-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Clients table ───────────────────────────────────────────────────── */
    .clients-table {
      width: 100%;
      border-collapse: collapse;
    }
    .clients-table th {
      padding: 10px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .clients-table td {
      padding: 14px 20px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .clients-table tr:last-child td { border-bottom: none; }
    .clients-table tbody tr:hover td { background: #fdf7eb; }

    .client-name-link {
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: color 0.12s;
    }
    .client-name-link:hover { color: var(--gold); }

    /* ── Lozenges ────────────────────────────────────────────────────────── */
    .package-lozenge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      background: var(--gold-dim);
      border: 1px solid rgba(201,164,58,0.5);
      color: var(--brown);
    }
    .status-lozenge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-lozenge[data-status="active"]   { background: #ddfaec; color: #1a6640; }
    .status-lozenge[data-status="inactive"] { background: #fdf3dc; color: #8a6200; }
    .status-lozenge[data-status="paused"]   { background: #fdf3dc; color: #8a6200; }
    .status-lozenge[data-status="lead"]     { background: #dce8fd; color: #1a4a8a; }
    .status-lozenge[data-status="closed"]   { background: #f2f2f2; color: #555; }

    body.lang-pt .status-lozenge[data-status="active"]::before   { content: "Ativo"; }
    body.lang-pt .status-lozenge[data-status="inactive"]::before { content: "Pausado"; }
    body.lang-pt .status-lozenge[data-status="paused"]::before   { content: "Pausado"; }
    body.lang-pt .status-lozenge[data-status="lead"]::before     { content: "Lead"; }
    body.lang-pt .status-lozenge[data-status="closed"]::before   { content: "Encerrado"; }
    body.lang-en .status-lozenge[data-status="active"]::before   { content: "Active"; }
    body.lang-en .status-lozenge[data-status="inactive"]::before { content: "Paused"; }
    body.lang-en .status-lozenge[data-status="paused"]::before   { content: "Paused"; }
    body.lang-en .status-lozenge[data-status="lead"]::before     { content: "Lead"; }
    body.lang-en .status-lozenge[data-status="closed"]::before   { content: "Closed"; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      padding: 52px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Error state ─────────────────────────────────────────────────────── */
    .error-msg {
      padding: 20px;
      color: #b44040;
      font-size: 13px;
    }

    /* ── Page header row ─────────────────────────────────────────────────── */
    .page-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    /* ── Add client button ───────────────────────────────────────────────── */
    .btn-add-client {
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-add-client:hover { opacity: 0.88; }

    /* ── Modal ───────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,29,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-overlay[hidden] { display: none !important; }

    .modal-box {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 8px 48px rgba(26,26,29,0.22);
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 1;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }

    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      color: var(--muted);
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-group label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }
    .field-group input,
    .field-group select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 11px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      appearance: none;
      -webkit-appearance: none;
    }
    .field-group input:focus,
    .field-group select:focus { outline: none; border-color: var(--gold); }

    .field-row { display: flex; gap: 12px; }
    .field-row .field-group { flex: 1; }

    .btn-primary {
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 11px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
    }
    .btn-primary:hover    { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.42; cursor: not-allowed; }

    .form-status {
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }
    .form-status.is-error { color: #b44040; }
    .form-status.is-ok    { color: #1a6640; }
  </style>
</head>
<body class="lang-pt">

  <header id="appHeader">
    <div class="header-right">
      <div class="user-pill">
        <span id="headerEmail"></span>
        <span class="role-badge" id="headerRole"></span>
      </div>
      <button class="lang-btn" onclick="apexNavToggleLang()">
        <span class="show-pt">EN</span>
        <span class="show-en">PT</span>
      </button>
      <button class="btn-header" onclick="handleSignOut()">
        <span class="show-pt">Sair</span>
        <span class="show-en">Sign out</span>
      </button>
    </div>
  </header>

  <div id="pageWrapper">
    <div id="navSidebar"></div>
    <div id="contentArea">
      <div id="loadingScreen">
        <div class="spinner"></div>
        <span class="show-pt">Carregando...</span>
        <span class="show-en">Loading...</span>
      </div>
      <main id="appMain" hidden>
        <div class="page-header-row">
          <h1 class="page-heading">
            <span class="show-pt">Clientes</span>
            <span class="show-en">Clients</span>
          </h1>
          <button class="btn-add-client" id="btnAddClient" onclick="openNewClientModal()">
            <span class="show-pt">+ Novo Cliente</span>
            <span class="show-en">+ Add New Client</span>
          </button>
        </div>
        <div class="content-card">
          <div id="clientsListContainer">
            <div class="empty-state show-pt">Carregando clientes...</div>
            <div class="empty-state show-en">Loading clients...</div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ══ MODAL: Novo Cliente / Add New Client ══════════════════════════════ -->
  <div id="modalNewClient" class="modal-overlay" hidden>
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>
          <span class="show-pt">Novo Cliente</span>
          <span class="show-en">Add New Client</span>
        </h3>
        <button class="modal-close" onclick="document.getElementById('modalNewClient').hidden=true">×</button>
      </div>
      <div class="modal-body">
        <!-- Business info -->
        <div style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;">
          <span class="show-pt">Empresa</span><span class="show-en">Business</span>
        </div>
        <div class="field-group">
          <input type="text" id="ncName" placeholder="Nome da empresa * / Company name *">
        </div>
        <div class="field-row">
          <div class="field-group">
            <select id="ncPackage">
              <option value="">— <span class="show-pt">Pacote</span><span class="show-en">Package</span> —</option>
              <option value="Essencial">Essencial</option>
              <option value="Profissional">Profissional</option>
              <option value="Sprint">Sprint</option>
              <option value="Premium">Premium</option>
              <option value="VIP">VIP</option>
            </select>
          </div>
          <div class="field-group">
            <select id="ncStatus">
              <option value="active">Ativo / Active</option>
              <option value="lead">Lead</option>
              <option value="paused">Pausado / Paused</option>
              <option value="closed">Encerrado / Closed</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <input type="text" id="ncIndustry" placeholder="Setor / Industry">
          </div>
          <div class="field-group">
            <input type="text" id="ncLocation" placeholder="Localização / Location">
          </div>
        </div>
        <!-- Primary contact -->
        <div style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--muted);margin-top:4px;margin-bottom:2px;">
          <span class="show-pt">Contato Principal</span><span class="show-en">Primary Contact</span>
        </div>
        <div class="field-row">
          <div class="field-group">
            <input type="text" id="nc1Name" placeholder="Nome / Name">
          </div>
          <div class="field-group">
            <input type="text" id="nc1Role" placeholder="Cargo / Role">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <input type="text" id="nc1Phone" placeholder="Tel / WhatsApp">
          </div>
          <div class="field-group">
            <input type="email" id="nc1Email" placeholder="Email">
          </div>
        </div>
        <!-- Second contact (hidden by default) -->
        <div id="nc2Wrap" style="display:none;">
          <div style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--muted);margin-top:4px;margin-bottom:2px;">
            <span class="show-pt">Segundo Contato</span><span class="show-en">Second Contact</span>
          </div>
          <div class="field-row">
            <div class="field-group">
              <input type="text" id="nc2Name" placeholder="Nome / Name">
            </div>
            <div class="field-group">
              <input type="text" id="nc2Role" placeholder="Cargo / Role">
            </div>
          </div>
          <div class="field-row">
            <div class="field-group">
              <input type="text" id="nc2Phone" placeholder="Tel / WhatsApp">
            </div>
            <div class="field-group">
              <input type="email" id="nc2Email" placeholder="Email">
            </div>
          </div>
        </div>
        <button type="button" id="btnAddSecondContact" onclick="toggleSecondContact()" style="background:none;border:none;color:var(--gold);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:0;text-align:left;">
          + <span class="show-pt">Adicionar segundo contato</span><span class="show-en">Add second contact</span>
        </button>
        <button class="btn-primary" id="btnSaveNewClient" onclick="handleSaveNewClient()">
          <span class="show-pt">Salvar Cliente</span>
          <span class="show-en">Save Client</span>
        </button>
        <div class="form-status" id="ncStatus2"></div>
      </div>
    </div>
  </div>

  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"
    integrity="sha384-5y/1XyjXGriVPCsfTI3ap84Bg9Db2y/GiQjR3nbrVJE03bworx9G08uSJEMme/mI"
    crossorigin="anonymous"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"
    integrity="sha384-EkqK+ezBWJuvO3hfrSx2iVqr3YQbhmnzn8kPhOpBZ+0GMVU5oGSgptwIu8D84HjE"
    crossorigin="anonymous"></script>
  <script src="nav.js"></script>

  <script>
    var WORKER_URL = "https://apex-api.farfromtimnah.workers.dev";

    var FIREBASE_CONFIG = {
      apiKey:            "AIzaSyB_OFg5ouKAu61vObNsHJaGQO0TikaIhy8",
      authDomain:        "apex-command-center-4b038.firebaseapp.com",
      projectId:         "apex-command-center-4b038",
      storageBucket:     "apex-command-center-4b038.firebasestorage.app",
      messagingSenderId: "894743550437",
      appId:             "1:894743550437:web:45041f841f7e8196db770c"
    };

    var auth        = null;
    var currentUser = null;

    function toggleLang() {
      var b = document.body;
      if (b.classList.contains("lang-pt")) { b.classList.remove("lang-pt"); b.classList.add("lang-en"); }
      else { b.classList.remove("lang-en"); b.classList.add("lang-pt"); }
    }

    function handleSignOut() {
      auth.signOut().then(function () {
        sessionStorage.removeItem("apex_role");
        sessionStorage.removeItem("apex_email");
        window.location.href = "index.html";
      });
    }

    function getToken() {
      if (!currentUser) { return Promise.reject(new Error("Not authenticated")); }
      return currentUser.getIdToken();
    }

    function apiFetch(path) {
      return getToken().then(function (token) {
        return fetch(WORKER_URL + path, { headers: { "Authorization": "Bearer " + token } });
      });
    }

    function setupPage(role) {
      document.getElementById("headerEmail").textContent = sessionStorage.getItem("apex_email") || (currentUser ? currentUser.email : "");
      document.getElementById("headerRole").textContent  = role;
      document.getElementById("loadingScreen").hidden    = true;
      document.getElementById("appMain").hidden          = false;
      // Only alice and developer can create clients
      var canCreate = (role === "alice" || role === "developer");
      var addBtn = document.getElementById("btnAddClient");
      if (addBtn) { addBtn.style.display = canCreate ? "" : "none"; }
      window.initNav && window.initNav();
      loadClients();
    }

    function loadClients() {
      apiFetch("/api/clients")
        .then(function (res) { return res.json(); })
        .then(function (data) { renderClients(data.clients || []); })
        .catch(function (e) {
          var el = document.getElementById("clientsListContainer");
          if (el) {
            el.innerHTML = '<div class="error-msg">Erro ao carregar clientes: ' + escHtml(e.message) + '</div>';
          }
        });
    }

    function renderClients(clients) {
      var container = document.getElementById("clientsListContainer");
      if (!container) { return; }

      if (clients.length === 0) {
        container.innerHTML =
          '<div class="empty-state"><span class="show-pt">Nenhum cliente encontrado.</span>' +
          '<span class="show-en">No clients found.</span></div>';
        return;
      }

      var table = document.createElement("table");
      table.className = "clients-table";

      var thead = document.createElement("thead");
      thead.innerHTML =
        "<tr>" +
          '<th><span class="show-pt">Nome</span><span class="show-en">Name</span></th>' +
          '<th><span class="show-pt">Pacote</span><span class="show-en">Package</span></th>' +
          '<th><span class="show-pt">Status</span><span class="show-en">Status</span></th>' +
        "</tr>";
      table.appendChild(thead);

      var tbody = document.createElement("tbody");
      for (var i = 0; i < clients.length; i++) {
        (function (c) {
          var tr = document.createElement("tr");

          // Name cell with link
          var tdName = document.createElement("td");
          var link   = document.createElement("a");
          link.className = "client-name-link";
          link.href      = "client.html?id=" + encodeURIComponent(c.id);
          link.textContent = c.name || "—";
          tdName.appendChild(link);
          tr.appendChild(tdName);

          // Package cell
          var tdPkg = document.createElement("td");
          if (c.package) {
            var pkgEl = document.createElement("span");
            pkgEl.className  = "package-lozenge";
            pkgEl.textContent = c.package;
            tdPkg.appendChild(pkgEl);
          } else {
            tdPkg.textContent = "—";
            tdPkg.style.color = "var(--muted)";
          }
          tr.appendChild(tdPkg);

          // Status cell
          var tdStatus = document.createElement("td");
          var statusEl = document.createElement("span");
          statusEl.className = "status-lozenge";
          statusEl.setAttribute("data-status", (c.status || "active").toLowerCase());
          tdStatus.appendChild(statusEl);
          tr.appendChild(tdStatus);

          tbody.appendChild(tr);
        })(clients[i]);
      }

      table.appendChild(tbody);
      container.innerHTML = "";
      container.appendChild(table);
    }

    function escHtml(str) {
      return (str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function openNewClientModal() {
      var ids = ["ncName","ncIndustry","ncLocation","nc1Name","nc1Role","nc1Phone","nc1Email","nc2Name","nc2Role","nc2Phone","nc2Email"];
      for (var i = 0; i < ids.length; i++) {
        var el = document.getElementById(ids[i]);
        if (el) { el.value = ""; }
      }
      document.getElementById("ncPackage").value  = "";
      document.getElementById("ncStatus").value   = "active";
      document.getElementById("ncStatus2").textContent = "";
      document.getElementById("ncStatus2").className   = "form-status";
      document.getElementById("btnSaveNewClient").disabled = false;
      document.getElementById("nc2Wrap").style.display = "none";
      document.getElementById("btnAddSecondContact").style.display = "";
      document.getElementById("modalNewClient").hidden = false;
    }

    function toggleSecondContact() {
      var wrap = document.getElementById("nc2Wrap");
      var btn  = document.getElementById("btnAddSecondContact");
      if (wrap.style.display === "none") {
        wrap.style.display = "";
        btn.style.display  = "none";
      }
    }

    function buildContactFromFields(nameId, roleId, phoneId, emailId) {
      var name  = (document.getElementById(nameId)  ? document.getElementById(nameId).value  : "").trim();
      var role  = (document.getElementById(roleId)  ? document.getElementById(roleId).value  : "").trim();
      var phone = (document.getElementById(phoneId) ? document.getElementById(phoneId).value : "").trim();
      var email = (document.getElementById(emailId) ? document.getElementById(emailId).value : "").trim();
      if (!name && !phone && !email) { return null; }
      return {
        name:     name  || null,
        role:     role  || null,
        phone:    phone || null,
        whatsapp: null,
        email:    email || null
      };
    }

    function handleSaveNewClient() {
      var name = (document.getElementById("ncName").value || "").trim();
      var statusEl = document.getElementById("ncStatus2");
      var btn      = document.getElementById("btnSaveNewClient");

      if (!name) {
        statusEl.textContent = "Nome é obrigatório. / Name is required.";
        statusEl.className   = "form-status is-error";
        return;
      }

      btn.disabled         = true;
      statusEl.textContent = "Salvando...";
      statusEl.className   = "form-status";

      // Build contacts array from intake fields
      var contacts = [];
      var c1 = buildContactFromFields("nc1Name", "nc1Role", "nc1Phone", "nc1Email");
      if (c1) { contacts.push(c1); }
      var c2 = buildContactFromFields("nc2Name", "nc2Role", "nc2Phone", "nc2Email");
      if (c2) { contacts.push(c2); }

      var payload = {
        name:     name,
        industry: (document.getElementById("ncIndustry").value || "").trim() || null,
        location: (document.getElementById("ncLocation").value || "").trim() || null,
        package:  document.getElementById("ncPackage").value  || null,
        status:   document.getElementById("ncStatus").value   || "active",
        contacts: contacts.length > 0 ? JSON.stringify(contacts) : null
      };

      getToken().then(function (token) {
        return fetch(WORKER_URL + "/api/clients", {
          method:  "POST",
          headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
          body:    JSON.stringify(payload)
        });
      }).then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.error) { throw new Error(data.error); }
          window.location.href = "client.html?id=" + encodeURIComponent(data.client_id);
        })
        .catch(function (e) {
          btn.disabled         = false;
          statusEl.textContent = "Erro: " + e.message;
          statusEl.className   = "form-status is-error";
        });
    }

    // Close modal on overlay click
    document.addEventListener("click", function (e) {
      var m = document.getElementById("modalNewClient");
      if (m && !m.hidden && e.target === m) { m.hidden = true; }
    });

    function init() {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
      auth.onAuthStateChanged(function (user) {
        if (!user) { window.location.href = "index.html"; return; }
        currentUser = user;
        var cached = sessionStorage.getItem("apex_role");
        if (cached) {
          setupPage(cached);
        } else {
          user.getIdToken().then(function (token) {
            return fetch(WORKER_URL + "/api/role", { headers: { "Authorization": "Bearer " + token } });
          }).then(function (res) { return res.json(); }).then(function (data) {
            sessionStorage.setItem("apex_role",  data.role);
            sessionStorage.setItem("apex_email", data.email);
            setupPage(data.role);
          }).catch(function () { window.location.href = "index.html"; });
        }
      });
    }

    init();
  </script>
</body>
</html>
