<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface  : #f9f7f4;
      --header   : #1a1a1d;
      --gold     : #C9A43A;
      --gold-dim : rgba(201,164,58,0.14);
      --brown    : #7a5c2e;
      --text     : #1a1a1d;
      --muted    : #6b6660;
      --border   : #e8e2d9;
      --card     : #ffffff;
      --radius   : 10px;
      --shadow   : 0 2px 16px rgba(26,26,29,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Bilingual toggle ──────────────────────────────────────────────── */
    body.lang-pt .show-en { display: none; }
    body.lang-en .show-pt { display: none; }

    /* ─── Status badge ───────────────────────────────────────────────────── */
    .status-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
    }
    .status-badge::before { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }

    body.lang-pt .status-badge[data-status="pending"]::before    { content: "Pendente"; }
    body.lang-pt .status-badge[data-status="summarized"]::before { content: "Resumido"; }
    body.lang-pt .status-badge[data-status="approved"]::before   { content: "Aprovado"; }
    body.lang-en .status-badge[data-status="pending"]::before    { content: "Pending"; }
    body.lang-en .status-badge[data-status="summarized"]::before { content: "Summarized"; }
    body.lang-en .status-badge[data-status="approved"]::before   { content: "Approved"; }

    .status-badge[data-status="pending"]    { background: #fdf3dc; color: #8a6200; }
    .status-badge[data-status="summarized"] { background: #dce8fd; color: #1a4a8a; }
    .status-badge[data-status="approved"]   { background: #ddfaec; color: #1a6640; }

    /* ─── Header ────────────────────────────────────────────────────────── */
    #appHeader {
      background: var(--header);
      height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }

    .logo-img { height: 32px; width: auto; display: block; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    .role-badge {
      background: var(--gold-dim);
      border: 1px solid rgba(201,164,58,0.4);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .btn-header {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.75);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-header:hover { border-color: rgba(255,255,255,0.45); color: #fff; }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lang-btn:hover { background: var(--gold-dim); }

    /* ─── Loading screen ─────────────────────────────────────────────────── */
    #loadingScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }
    #loadingScreen[hidden] { display: none; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── App main ───────────────────────────────────────────────────────── */
    #appMain {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── Page heading ───────────────────────────────────────────────────── */
    .page-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    /* ─── Stat cards row ─────────────────────────────────────────────────── */
    .stat-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      flex: 1;
      min-width: 140px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-value.is-gold { color: var(--gold); }

    /* ─── Content card ───────────────────────────────────────────────────── */
    .content-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .content-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .content-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    /* ─── Sessions table ─────────────────────────────────────────────────── */
    .sessions-table {
      width: 100%;
      border-collapse: collapse;
    }

    .sessions-table th {
      padding: 10px 18px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .sessions-table td {
      padding: 13px 18px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .sessions-table tr:last-child td { border-bottom: none; }
    .sessions-table tbody tr:hover td { background: #fdf7eb; }

    .client-link {
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: color 0.12s;
    }
    .client-link:hover { color: var(--gold); }

    /* ─── Empty / error states ───────────────────────────────────────────── */
    .table-empty {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ─── CTA link button ────────────────────────────────────────────────── */
    .btn-cta-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-cta-link:hover { opacity: 0.88; }

    /* ─── Print ──────────────────────────────────────────────────────────── */
    @media print {
      #appHeader, #navSidebar { display: none !important; }
    }

    /* ─── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #appMain { padding: 16px; }
      .stat-card { min-width: 100px; }
    }
  </style>
</head>
<body class="lang-pt">

  <!-- ═══════════════ HEADER ═══════════════════════════════════════════════ -->
  <header id="appHeader">
    <div class="header-right">
      <div class="user-pill">
        <span id="headerEmail"></span>
        <span class="role-badge" id="headerRole"></span>
      </div>
      <button class="lang-btn" onclick="apexNavToggleLang()">
        <span class="show-pt">EN</span>
        <span class="show-en">PT</span>
      </button>
      <button class="btn-header" onclick="handleSignOut()">
        <span class="show-pt">Sair</span>
        <span class="show-en">Sign out</span>
      </button>
    </div>
  </header>

  <div id="pageWrapper">
    <div id="navSidebar"></div>
    <div id="contentArea">

  <!-- ═══════════════ LOADING SCREEN ═══════════════════════════════════════ -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <span class="show-pt">Carregando...</span>
    <span class="show-en">Loading...</span>
  </div>

  <!-- ═══════════════ MAIN OVERVIEW ════════════════════════════════════════ -->
  <main id="appMain" hidden>

    <!-- Page heading + CTA -->
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
      <h1 class="page-heading">
        <span class="show-pt">Visão Geral</span>
        <span class="show-en">Overview</span>
      </h1>
      <a href="sessions.html" class="btn-cta-link">
        <span class="show-pt">+ Nova Sessão</span>
        <span class="show-en">+ New Session</span>
      </a>
    </div>

    <!-- Snapshot stats -->
    <div class="stat-row" id="statRow">
      <div class="stat-card">
        <div class="stat-label">
          <span class="show-pt">Pendentes</span>
          <span class="show-en">Pending</span>
        </div>
        <div class="stat-value" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">
          <span class="show-pt">Resumidos</span>
          <span class="show-en">Summarized</span>
        </div>
        <div class="stat-value" id="statSummarized">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">
          <span class="show-pt">Aprovados</span>
          <span class="show-en">Approved</span>
        </div>
        <div class="stat-value is-gold" id="statApproved">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">
          <span class="show-pt">Total de Sessões</span>
          <span class="show-en">Total Sessions</span>
        </div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
    </div>

    <!-- Recent sessions table -->
    <div class="content-card">
      <div class="content-card-header">
        <h2 class="content-card-title">
          <span class="show-pt">Sessões Recentes</span>
          <span class="show-en">Recent Sessions</span>
        </h2>
        <a href="sessions.html" style="font-size:12px;color:var(--gold);text-decoration:none;font-weight:600;">
          <span class="show-pt">Ver todas →</span>
          <span class="show-en">View all →</span>
        </a>
      </div>
      <div id="recentSessionsContainer">
        <div class="table-empty">
          <div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto 8px;"></div>
        </div>
      </div>
    </div>

  </main><!-- /appMain -->

    </div><!-- /contentArea -->
  </div><!-- /pageWrapper -->

  <!-- ═══════════════ FIREBASE + SCRIPT ════════════════════════════════════ -->
  <script src="nav.js"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"
    integrity="sha384-5y/1XyjXGriVPCsfTI3ap84Bg9Db2y/GiQjR3nbrVJE03bworx9G08uSJEMme/mI"
    crossorigin="anonymous"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"
    integrity="sha384-EkqK+ezBWJuvO3hfrSx2iVqr3YQbhmnzn8kPhOpBZ+0GMVU5oGSgptwIu8D84HjE"
    crossorigin="anonymous"></script>

  <script>
    // ── Configuration ──────────────────────────────────────────────────────
    var WORKER_URL = "https://apex-api.farfromtimnah.workers.dev";

    var FIREBASE_CONFIG = {
      apiKey:            "AIzaSyB_OFg5ouKAu61vObNsHJaGQO0TikaIhy8",
      authDomain:        "apex-command-center-4b038.firebaseapp.com",
      projectId:         "apex-command-center-4b038",
      storageBucket:     "apex-command-center-4b038.firebasestorage.app",
      messagingSenderId: "894743550437",
      appId:             "1:894743550437:web:45041f841f7e8196db770c"
    };

    // ── State ──────────────────────────────────────────────────────────────
    var auth        = null;
    var currentUser = null;
    var currentRole = null;

    // ── Utilities ──────────────────────────────────────────────────────────

    function formatDate(str) {
      if (!str) { return "--"; }
      var p = str.split("-");
      if (p.length !== 3) { return str; }
      return p[2] + "/" + p[1] + "/" + p[0];
    }

    function getToken() {
      if (!currentUser) { return Promise.reject(new Error("Not authenticated")); }
      return currentUser.getIdToken();
    }

    function apiFetch(path) {
      return getToken().then(function(token) {
        return fetch(WORKER_URL + path, { headers: { "Authorization": "Bearer " + token } });
      });
    }

    // ── Auth & bootstrap ───────────────────────────────────────────────────

    function handleSignOut() {
      auth.signOut().then(function() {
        sessionStorage.removeItem("apex_role");
        sessionStorage.removeItem("apex_email");
        window.location.href = "index.html";
      });
    }

    function setupDashboard(role) {
      currentRole = role;

      document.getElementById("headerEmail").textContent =
        sessionStorage.getItem("apex_email") || (currentUser ? currentUser.email : "");
      document.getElementById("headerRole").textContent = role;

      document.getElementById("loadingScreen").hidden = true;
      document.getElementById("appMain").hidden = false;

      window.initNav && window.initNav();
      loadOverview();
    }

    function init() {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();

      auth.onAuthStateChanged(function(user) {
        if (!user) { window.location.href = "index.html"; return; }
        currentUser = user;
        var cachedRole = sessionStorage.getItem("apex_role");
        if (cachedRole) {
          setupDashboard(cachedRole);
        } else {
          getToken().then(function(token) {
            return fetch(WORKER_URL + "/api/role", { headers: { "Authorization": "Bearer " + token } });
          }).then(function(res) {
            if (!res.ok) { throw new Error("HTTP " + res.status); }
            return res.json();
          }).then(function(data) {
            sessionStorage.setItem("apex_role",  data.role);
            sessionStorage.setItem("apex_email", data.email);
            setupDashboard(data.role);
          }).catch(function() {
            sessionStorage.removeItem("apex_role");
            window.location.href = "index.html";
          });
        }
      });
    }

    // ── Overview data ──────────────────────────────────────────────────────

    function loadOverview() {
      apiFetch("/api/sessions")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var sessions = data.sessions || [];
          renderStats(sessions);
          renderRecentSessions(sessions);
        })
        .catch(function(e) {
          document.getElementById("recentSessionsContainer").innerHTML =
            '<div class="table-empty" style="color:#b44040;">Erro ao carregar sessões.</div>';
          console.error("Overview load error:", e.message);
        });
    }

    function renderStats(sessions) {
      var pending = 0, summarized = 0, approved = 0;
      for (var i = 0; i < sessions.length; i++) {
        var s = sessions[i].status;
        if (s === "pending")    { pending++; }
        if (s === "summarized") { summarized++; }
        if (s === "approved")   { approved++; }
      }
      document.getElementById("statPending").textContent    = pending;
      document.getElementById("statSummarized").textContent = summarized;
      document.getElementById("statApproved").textContent   = approved;
      document.getElementById("statTotal").textContent      = sessions.length;
    }

    function renderRecentSessions(sessions) {
      var container = document.getElementById("recentSessionsContainer");
      var recent = sessions.slice(0, 10);

      if (recent.length === 0) {
        container.innerHTML =
          '<div class="table-empty">' +
          '<span class="show-pt">Nenhuma sessão ainda. <a href="sessions.html" style="color:var(--gold);">Criar primeira sessão →</a></span>' +
          '<span class="show-en">No sessions yet. <a href="sessions.html" style="color:var(--gold);">Create first session →</a></span>' +
          '</div>';
        return;
      }

      var table = document.createElement("table");
      table.className = "sessions-table";

      var thead = document.createElement("thead");
      thead.innerHTML =
        "<tr>" +
          '<th><span class="show-pt">Cliente</span><span class="show-en">Client</span></th>' +
          '<th><span class="show-pt">Data</span><span class="show-en">Date</span></th>' +
          '<th><span class="show-pt">Status</span><span class="show-en">Status</span></th>' +
          '<th></th>' +
        "</tr>";
      table.appendChild(thead);

      var tbody = document.createElement("tbody");
      for (var i = 0; i < recent.length; i++) {
        (function(s) {
          var tr = document.createElement("tr");

          // Client name cell
          var tdClient = document.createElement("td");
          if (s.client_id) {
            var link = document.createElement("a");
            link.href = "client.html?id=" + s.client_id;
            link.className = "client-link";
            link.textContent = s.client_name || "—";
            tdClient.appendChild(link);
          } else {
            tdClient.textContent = s.client_name || "—";
            tdClient.style.color = "var(--muted)";
          }
          tr.appendChild(tdClient);

          // Date
          var tdDate = document.createElement("td");
          tdDate.textContent = formatDate(s.date);
          tdDate.style.color = "var(--muted)";
          tr.appendChild(tdDate);

          // Status badge
          var tdStatus = document.createElement("td");
          var badge = document.createElement("span");
          badge.className = "status-badge";
          badge.setAttribute("data-status", s.status || "pending");
          tdStatus.appendChild(badge);
          tr.appendChild(tdStatus);

          // Action link → sessions.html workbench
          var tdAction = document.createElement("td");
          tdAction.style.textAlign = "right";
          var actionLink = document.createElement("a");
          actionLink.href = "sessions.html";
          actionLink.style.cssText = "font-size:12px;color:var(--gold);text-decoration:none;font-weight:600;";
          actionLink.innerHTML = '<span class="show-pt">Abrir →</span><span class="show-en">Open →</span>';
          tdAction.appendChild(actionLink);
          tr.appendChild(tdAction);

          tbody.appendChild(tr);
        })(recent[i]);
      }
      table.appendChild(tbody);
      container.innerHTML = "";
      container.appendChild(table);
    }

    // ── Bootstrap ──────────────────────────────────────────────────────────
    init();
  </script>

</body>
</html>
