<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface : #f9f7f4;
      --header  : #1a1a1d;
      --gold    : #C9A43A;
      --text    : #1a1a1d;
      --muted   : #6b6660;
      --border  : #e8e2d9;
      --card    : #ffffff;
      --radius  : 10px;
      --shadow  : 0 2px 20px rgba(26,26,29,0.09);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.lang-pt .show-en { display: none; }
    body.lang-en .show-pt { display: none; }

    /* ---------- Header ---------- */
    header {
      background: var(--header);
      height: 64px;
      padding: 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo-img { height: 34px; width: auto; display: block; }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lang-btn:hover { background: rgba(201,164,58,0.14); }

    /* ---------- Main ---------- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 20px;
    }

    /* ---------- Two-piece login layout ---------- */
    .auth-stack {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 28px;
      width: fit-content;
      max-width: min(420px, calc(100vw - 40px));
      min-width: 260px;
    }

    .auth-panel {
      background: rgba(26, 26, 24, 0.62);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      padding: 36px 40px;
      text-align: center;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    /* ---------- Logo & wordmark ---------- */
    .logo-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 10px;
    }

    .card-logo {
      display: block;
      height: 72px;
      width: auto;
      animation: logoFadeIn 1.6s ease-out forwards;
    }

    @keyframes logoFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-wordmark {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ---------- Shimmer overlay ---------- */
    .logo-shimmer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      opacity: 0; /* hidden by default — only activated when mask-image is supported */
    }

    @supports (-webkit-mask-size: cover) or (mask-size: cover) {
      .logo-shimmer {
        background: linear-gradient(
          105deg,
          transparent 20%,
          rgba(255, 248, 185, 0.65) 50%,
          transparent 80%
        );
        background-size: 300% 100%;
        background-position: 110% center;
        -webkit-mask-image: url('https://apexbusiness.pro/wp-content/uploads/2025/12/LogoApex.png');
        -webkit-mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-image: url('https://apexbusiness.pro/wp-content/uploads/2025/12/LogoApex.png');
        mask-size: contain;
        mask-repeat: no-repeat;
        mask-position: center;
        opacity: 1;
        /* delay 1.8s so shimmer only starts after the 1.6s fade-in completes */
        animation: shimmer 7s ease-in-out 1.8s infinite;
      }
    }

    @keyframes shimmer {
      /* bright band sweeps left-to-right over ~2s, then pauses for ~5s */
      0%   { background-position: 110% center; }
      28%  { background-position: -10% center; }
      100% { background-position: -10% center; }
    }

    /* Google sign-in button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-google:hover  { opacity: 0.88; }
    .btn-google:active { transform: scale(0.98); }
    .btn-google:disabled { opacity: 0.42; cursor: not-allowed; transform: none; }

    .g-mark {
      width: 22px;
      height: 22px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 800;
      color: #4285F4;
      line-height: 1;
    }

    .status-msg {
      margin-top: 4px;
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .status-msg.is-error { color: #b44040; }

    /* ---------- Footer ---------- */
    footer {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    /* ---------- Ken Burns background ---------- */
    @keyframes kenburns {
      from { transform: scale(1.0) translate(0, 0); }
      to   { transform: scale(1.06) translate(1.5%, 0.8%); }
    }

    #bg-image {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -2;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform-origin: center center;
    }

    #bg-image.is-loaded {
      animation: kenburns 28s ease-in-out infinite alternate;
    }

    #bg-scrim {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      background: rgba(26, 26, 24, 0.55);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      #bg-image.is-loaded { animation: none; }
      .card-logo { animation: none; opacity: 1; transform: none; }
      .logo-shimmer { animation: none !important; opacity: 0 !important; }
    }
  </style>
</head>
<body class="lang-pt">

  <div id="bg-image" aria-hidden="true"></div>
  <div id="bg-scrim" aria-hidden="true"></div>
  <script>
  (function () {
    var imgs = ['picture1.jpg','picture2.jpg','Picture3.jpg','Picture4.jpg','Picture5.jpg'];
    var url = 'assets/login/' + imgs[Math.floor(Math.random() * imgs.length)];
    var bgEl = document.getElementById('bg-image');
    var scrimEl = document.getElementById('bg-scrim');
    var img = new Image();
    img.onload = function () {
      bgEl.style.backgroundImage = 'url(' + url + ')';
      bgEl.classList.add('is-loaded');
      scrimEl.style.opacity = '1';
    };
    img.src = url;
  }());
  </script>

  <header>
    <img
      src="https://apexbusiness.pro/wp-content/uploads/2025/12/LogoApex.png"
      alt="Apex Business &amp; Leadership"
      class="logo-img"
    >
    <button class="lang-btn" onclick="toggleLang()">
      <span class="show-pt">EN</span>
      <span class="show-en">PT</span>
    </button>
  </header>

  <main>
    <div class="auth-stack">
      <div class="auth-panel">
        <p class="eyebrow">
          <span class="show-pt">Plataforma Operacional</span>
          <span class="show-en">Operations Platform</span>
        </p>
        <div class="logo-wrap">
          <img
            src="https://apexbusiness.pro/wp-content/uploads/2025/12/LogoApex.png"
            alt="Apex Business &amp; Leadership"
            class="card-logo"
          >
          <div class="logo-shimmer" aria-hidden="true"></div>
        </div>
        <p class="card-wordmark">Command Center</p>
      </div>
      <button class="btn-google" id="signInBtn" onclick="handleSignIn()">
        <span class="g-mark">G</span>
        <span class="show-pt">Entrar com Google</span>
        <span class="show-en">Sign in with Google</span>
      </button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </main>

  <footer>
    <span class="show-pt">&copy; 2025 Apex Business &amp; Leadership. Todos os direitos reservados.</span>
    <span class="show-en">&copy; 2025 Apex Business &amp; Leadership. All rights reserved.</span>
  </footer>

  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"
    integrity="sha384-5y/1XyjXGriVPCsfTI3ap84Bg9Db2y/GiQjR3nbrVJE03bworx9G08uSJEMme/mI"
    crossorigin="anonymous"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"
    integrity="sha384-EkqK+ezBWJuvO3hfrSx2iVqr3YQbhmnzn8kPhOpBZ+0GMVU5oGSgptwIu8D84HjE"
    crossorigin="anonymous"></script>
  <script>
    // ── CONFIGURATION ────────────────────────────────────────────────────────
    // Replace every placeholder before deploying.

    var WORKER_URL = "https://apex-api.farfromtimnah.workers.dev";

    var FIREBASE_CONFIG = {
      apiKey:            "AIzaSyB_OFg5ouKAu61vObNsHJaGQO0TikaIhy8",
      authDomain:        "apex-command-center-4b038.firebaseapp.com",
      projectId:         "apex-command-center-4b038",
      storageBucket:     "apex-command-center-4b038.firebasestorage.app",
      messagingSenderId: "894743550437",
      appId:             "1:894743550437:web:45041f841f7e8196db770c"
    };
    // ─────────────────────────────────────────────────────────────────────────

    firebase.initializeApp(FIREBASE_CONFIG);

    var auth      = firebase.auth();
    var gProvider = new firebase.auth.GoogleAuthProvider();

    function toggleLang() {
      var b = document.body;
      if (b.classList.contains("lang-pt")) {
        b.classList.remove("lang-pt");
        b.classList.add("lang-en");
      } else {
        b.classList.remove("lang-en");
        b.classList.add("lang-pt");
      }
    }

    function setStatus(msg, isError) {
      var el = document.getElementById("statusMsg");
      el.textContent = msg;
      el.className = "status-msg" + (isError ? " is-error" : "");
    }

    function handleSignIn() {
      var btn = document.getElementById("signInBtn");
      btn.disabled = true;
      setStatus("...");

      auth.signInWithPopup(gProvider)
        .then(function(result) {
          return result.user.getIdToken();
        })
        .then(function(token) {
          return fetch(WORKER_URL + "/api/role", {
            headers: { "Authorization": "Bearer " + token }
          });
        })
        .then(function(res) {
          if (!res.ok) { throw new Error("HTTP " + res.status); }
          return res.json();
        })
        .then(function(data) {
          sessionStorage.setItem("apex_role",  data.role);
          sessionStorage.setItem("apex_email", data.email);
          window.location.href = "dashboard.html";
        })
        .catch(function(e) {
          btn.disabled = false;
          setStatus("Error: " + e.message, true);
        });
    }

    // Skip sign-in if already authenticated and role cached
    auth.onAuthStateChanged(function(user) {
      if (user && sessionStorage.getItem("apex_role")) {
        window.location.href = "dashboard.html";
      }
    });
  </script>

</body>
</html>
