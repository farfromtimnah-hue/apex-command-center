<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex — Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface  : #f9f7f4;
      --header   : #1a1a1d;
      --gold     : #C9A43A;
      --gold-dim : rgba(201,164,58,0.14);
      --brown    : #7a5c2e;
      --text     : #1a1a1d;
      --muted    : #6b6660;
      --border   : #e8e2d9;
      --card     : #ffffff;
      --radius   : 10px;
      --shadow   : 0 2px 16px rgba(26,26,29,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Bilingual toggle ──────────────────────────────────────────────── */
    body.lang-pt .show-en { display: none; }
    body.lang-en .show-pt { display: none; }

    /* ─── Header ────────────────────────────────────────────────────────── */
    #appHeader {
      background: var(--header);
      height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }

    .logo-img { height: 32px; width: auto; display: block; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    .role-badge {
      background: var(--gold-dim);
      border: 1px solid rgba(201,164,58,0.4);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .btn-header {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.75);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-header:hover { border-color: rgba(255,255,255,0.45); color: #fff; }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lang-btn:hover { background: var(--gold-dim); }

    /* ─── Loading screen ─────────────────────────────────────────────────── */
    #loadingScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }
    #loadingScreen[hidden] { display: none !important; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── App main ───────────────────────────────────────────────────────── */
    #appMain {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Page header row ────────────────────────────────────────────────── */
    .page-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    /* ─── Role tabs (Consultant / Client) ───────────────────────────────── */
    .role-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
    }

    .role-tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .role-tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--gold);
    }

    .role-tab-btn:not(.active):hover {
      color: var(--text);
    }

    .role-tab-count {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      margin-left: 6px;
      color: var(--muted);
      vertical-align: middle;
    }

    .role-tab-btn.active .role-tab-count {
      background: var(--gold-dim);
      border-color: rgba(201,164,58,0.3);
      color: var(--brown);
    }

    /* ─── Controls bar (sort + done count) ──────────────────────────────── */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ─── View toggle pills ──────────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card);
    }

    .view-toggle-btn {
      background: transparent;
      border: none;
      padding: 7px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .view-toggle-btn + .view-toggle-btn {
      border-left: 1px solid var(--border);
    }

    .view-toggle-btn.active {
      background: var(--gold);
      color: #fff;
    }

    .view-toggle-btn:not(.active):hover {
      background: var(--surface);
      color: var(--text);
    }

    /* ─── Done counter chip ──────────────────────────────────────────────── */
    .done-chip {
      font-size: 12px;
      color: var(--muted);
    }

    /* ─── Task cards container ───────────────────────────────────────────── */
    #tasksContainer {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ─── Group heading (by-type view) ──────────────────────────────────── */
    .group-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 16px 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .group-heading:first-child {
      padding-top: 0;
    }

    /* ─── Task row ───────────────────────────────────────────────────────── */
    .task-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: border-color 0.12s, opacity 0.15s;
    }

    .task-row:hover {
      border-color: rgba(201,164,58,0.5);
    }

    /* Done state */
    .task-row.done {
      opacity: 0.52;
      border-color: var(--border);
    }
    .task-row.done:hover {
      opacity: 0.62;
      border-color: var(--border);
    }
    .task-row.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* ─── Checkbox toggle ────────────────────────────────────────────────── */
    .task-check {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.12s, background 0.12s;
      padding: 0;
    }

    .task-check:hover {
      border-color: var(--gold);
    }

    .task-check.checked {
      border-color: #888;
      background: #888;
    }

    .task-check.checked::after {
      content: "";
      display: block;
      width: 5px;
      height: 9px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 5px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-client {
      font-size: 12px;
      font-weight: 600;
      color: var(--brown);
      text-decoration: none;
    }
    .task-client:hover { text-decoration: underline; }

    .task-session-date {
      font-size: 12px;
      color: var(--muted);
    }

    .task-due {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      padding: 2px 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .task-due.overdue {
      color: #b44040;
      border-color: rgba(180,64,64,0.3);
      background: #fff0f0;
    }

    .task-type-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .task-type-tag.rafa   { color: var(--brown); border-color: rgba(201,164,58,0.4); background: var(--gold-dim); }
    .task-type-tag.client { color: #3a5f9a; border-color: rgba(58,95,154,0.3); background: rgba(58,95,154,0.08); }

    /* ─── Empty state ────────────────────────────────────────────────────── */
    .tasks-empty {
      padding: 52px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .tasks-empty-icon {
      font-size: 36px;
      opacity: 0.5;
    }

    /* ─── Session source note (footer-style) ────────────────────────────── */
    .tasks-footer-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 8px 0 4px;
    }

    /* ─── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #appMain { padding: 16px; }
      .task-meta { gap: 6px; }
    }
  </style>
</head>
<body class="lang-pt">

  <!-- ═══════════════ HEADER ═══════════════════════════════════════════════ -->
  <header id="appHeader">
    <div class="header-right">
      <div class="user-pill">
        <span id="headerEmail"></span>
        <span class="role-badge" id="headerRole"></span>

      <button class="lang-btn" onclick="apexNavToggleLang()">

        <span class="show-en">PT</span>

        <span class="show-pt">Sair</span>

      </button>

  </header>

  <div id="pageWrapper">
    <div id="navSidebar"></div>
    <div id="contentArea">

  <!-- ═══════════════ LOADING SCREEN ═══════════════════════════════════════ -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <span class="show-pt">Carregando...</span>
    <span class="show-en">Loading...</span>
  </div>

  <!-- ═══════════════ MAIN ═════════════════════════════════════════════════ -->
  <main id="appMain" hidden>

    <!-- Page heading -->
    <div class="page-header-row">
      <h1 class="page-heading">
        <span class="show-pt">Tarefas</span>
        <span class="show-en">Tasks</span>
      </h1>
    </div>

    <!-- Role tabs -->
    <div class="role-tabs">
      <button class="role-tab-btn active" id="tabBtnConsultant" onclick="setTabRole('consultant')">

    <!-- Sort controls + done chip -->
    <div class="controls-bar">

          <span class="show-pt">Por Data</span>
          <span class="show-en">By Date</span>
        </button>
        <button class="view-toggle-btn" id="btnViewType" onclick="setTaskView('type')">
          <span class="show-pt">Por Tipo</span>
          <span class="show-en">By Type</span>
        </button>
      </div>
      <span class="done-chip" id="doneChip"></span>

    <div id="tasksContainer">
      <!-- Rendered by JS -->
    </div>

  </main><!-- /appMain -->

    </div><!-- /contentArea -->
  </div><!-- /pageWrapper -->

  <!-- ═══════════════ FIREBASE + SCRIPT ════════════════════════════════════ -->
  <script src="nav.js"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"
    integrity="sha384-5y/1XyjXGriVPCsfTI3ap84Bg9Db2y/GiQjR3nbrVJE03bworx9G08uSJEMme/mI"
    crossorigin="anonymous"></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"
    integrity="sha384-EkqK+ezBWJuvO3hfrSx2iVqr3YQbhmnzn8kPhOpBZ+0GMVU5oGSgptwIu8D84HjE"
    crossorigin="anonymous"></script>

  <script>
    // ── Configuration ──────────────────────────────────────────────────────
    var WORKER_URL = "https://apex-api.farfromtimnah.workers.dev";

    var FIREBASE_CONFIG = {
      apiKey:            "AIzaSyB_OFg5ouKAu61vObNsHJaGQO0TikaIhy8",
      authDomain:        "apex-command-center-4b038.firebaseapp.com",
      projectId:         "apex-command-center-4b038",
      storageBucket:     "apex-command-center-4b038.firebasestorage.app",
      messagingSenderId: "894743550437",
      appId:             "1:894743550437:web:45041f841f7e8196db770c"
    };

    // ── State ──────────────────────────────────────────────────────────────
    var auth        = null;
    var currentUser = null;
    var taskView    = "date";         // "date" | "type"
    var tabRole     = "consultant";   // "consultant" | "client"
    var allTasks    = [];             // all derived task rows (both tabs)
    var completedMap = {};            // taskKey → true/false; keyed per session

    // ── Month abbrev map for parsing "DD Mon" due strings ─────────────────
    var MONTH_MAP = {
      "jan": 0, "fev": 0, "feb": 0,
      "mar": 2,
      "abr": 3, "apr": 3,
      "mai": 4, "may": 4,
      "jun": 5,
      "jul": 6,
      "ago": 7, "aug": 7,
      "set": 8, "sep": 8,
      "out": 9, "oct": 9,
      "nov": 10,
      "dez": 11, "dec": 11
    };

    // ── Completion persistence (localStorage) ──────────────────────────────
    // Merged with backend task_completions loaded from sessions at startup.
    // localStorage is the fast-read cache; backend is durable.

    function completionStorageKey() {
      var email = sessionStorage.getItem("apex_email") || "unknown";
      return "apex_task_completions_" + email;
    }

    function loadLocalCompletions() {
      try {
        var raw = localStorage.getItem(completionStorageKey());
        if (raw) { completedMap = JSON.parse(raw); }
      } catch(e) { completedMap = {}; }
    }

    function saveLocalCompletions() {
      try {
        localStorage.setItem(completionStorageKey(), JSON.stringify(completedMap));
      } catch(e) {}
    }

    // ── Auth & bootstrap ───────────────────────────────────────────────────

    function handleSignOut() {
      auth.signOut().then(function() {
        sessionStorage.removeItem("apex_role");
        sessionStorage.removeItem("apex_email");
        window.location.href = "index.html";
      });
    }

    function setupPage(role) {
      document.getElementById("headerEmail").textContent =
        sessionStorage.getItem("apex_email") || (currentUser ? currentUser.email : "");
      document.getElementById("headerRole").textContent = role;

      document.getElementById("loadingScreen").hidden = true;
      document.getElementById("appMain").hidden = false;

      window.initNav && window.initNav();
      loadLocalCompletions();
      loadTasks();
    }

    function init() {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();

      auth.onAuthStateChanged(function(user) {
        if (!user) { window.location.href = "index.html"; return; }
        currentUser = user;
        var cached = sessionStorage.getItem("apex_role");
        if (cached) {
          setupPage(cached);
        } else {
          user.getIdToken().then(function(token) {
            return fetch(WORKER_URL + "/api/role", { headers: { "Authorization": "Bearer " + token } });
          }).then(function(res) { return res.json(); })
            .then(function(data) {
              sessionStorage.setItem("apex_role",  data.role);
              sessionStorage.setItem("apex_email", data.email);
              setupPage(data.role);
            })
            .catch(function() { window.location.href = "index.html"; });
        }
      });
    }

    // ── Data: fetch sessions and derive tasks ──────────────────────────────

    function loadTasks() {
      user_getToken().then(function(token) {
        return fetch(WORKER_URL + "/api/sessions", { headers: { "Authorization": "Bearer " + token } });
      }).then(function(res) { return res.json(); })
        .then(function(data) {
          allTasks = deriveTasks(data.sessions || []);
          updateTabCounts();
          renderTaskView();
        })
        .catch(function(e) {
          document.getElementById("tasksContainer").innerHTML =
            '<div class="tasks-empty" style="color:#b44040;">Erro ao carregar tarefas: ' + escHtml(e.message) + '</div>';
        });
    }

    function user_getToken() {
      if (!currentUser) { return Promise.reject(new Error("Not authenticated")); }
      return currentUser.getIdToken();
    }

    // ── Task derivation ────────────────────────────────────────────────────
    // Primary: pdf_data.consultant_followups (Rafa) + pdf_data.client_actions (client)
    //   — structured array [{text, due}] with per-item due dates
    // Fallback: summary_json.rafa_followups.pt/en — free text block, one task per session
    //
    // Completion state from task_completions column is merged into completedMap.
    // Task key format: "{sessionId}_{type}_{index}"

    function deriveTasks(sessions) {
      var tasks = [];
      var today = new Date();
      today.setHours(0, 0, 0, 0);

      for (var i = 0; i < sessions.length; i++) {
        var s = sessions[i];
        if (!s.summary_json && !s.pdf_data) { continue; }

        var clientName  = s.client_name || "—";
        var clientId    = s.client_id   || null;
        var sessionDate = s.date        || null;
        var sessionYear = sessionDate ? parseInt(sessionDate.split("-")[0], 10) : today.getFullYear();
        var sessionId   = s.id;

        // Merge backend completions into completedMap (backend wins over local for this session)
        if (s.task_completions) {
          try {
            var backendMap = JSON.parse(s.task_completions);
            var bkeys = Object.keys(backendMap);
            for (var bk = 0; bk < bkeys.length; bk++) {
              completedMap[bkeys[bk]] = backendMap[bkeys[bk]];
            }
          } catch(e) {}
        }

        var pdfData = null;
        if (s.pdf_data) {
          try { pdfData = JSON.parse(s.pdf_data); } catch(e) { pdfData = null; }
        }

        if (pdfData && pdfData.consultant_followups && pdfData.consultant_followups.length) {
          for (var j = 0; j < pdfData.consultant_followups.length; j++) {
            var cf = pdfData.consultant_followups[j];
            var taskKey = sessionId + "_rafa_" + j;
            var dueDate = parseDueDate(cf.due, sessionYear, today);
            tasks.push({
              key:         taskKey,
              type:        "rafa",
              text:        cf.text || "",
              due:         cf.due  || null,
              dueDate:     dueDate,
              overdue:     dueDate ? dueDate < today : false,
              clientName:  clientName,
              clientId:    clientId,
              sessionDate: sessionDate,
              sessionId:   sessionId
            });
          }
        }

        if (pdfData && pdfData.client_actions && pdfData.client_actions.length) {
          for (var k = 0; k < pdfData.client_actions.length; k++) {
            var ca = pdfData.client_actions[k];
            var taskKey2 = sessionId + "_client_" + k;
            var dueDate2 = parseDueDate(ca.due, sessionYear, today);
            tasks.push({
              key:         taskKey2,
              type:        "client",
              text:        ca.text || "",
              due:         ca.due  || null,
              dueDate:     dueDate2,
              overdue:     dueDate2 ? dueDate2 < today : false,
              clientName:  clientName,
              clientId:    clientId,
              sessionDate: sessionDate,
              sessionId:   sessionId
            });
          }
        }

        // Fallback: rafa_followups text block (no pdf_data)
        if (!pdfData && s.summary_json) {
          var sj = null;
          try { sj = JSON.parse(s.summary_json); } catch(e) { sj = null; }
          if (sj && sj.rafa_followups) {
            var rfText = document.body.classList.contains("lang-en")
              ? (sj.rafa_followups.en || sj.rafa_followups.pt || "")
              : (sj.rafa_followups.pt || sj.rafa_followups.en || "");
            if (rfText) {
              var taskKey3 = sessionId + "_text_0";
              tasks.push({
                key:         taskKey3,
                type:        "text",
                text:        rfText,
                due:         null,
                dueDate:     null,
                overdue:     false,
                clientName:  clientName,
                clientId:    clientId,
                sessionDate: sessionDate,
                sessionId:   sessionId
              });
            }
          }
        }
      }

      return tasks;
    }

    // Parse "DD Mon" string (e.g. "20 Jun") into a Date object.
    function parseDueDate(dueStr, sessionYear, today) {
      if (!dueStr) { return null; }
      var parts = dueStr.trim().split(/\s+/);
      if (parts.length < 2) { return null; }
      var day = parseInt(parts[0], 10);
      var mon = MONTH_MAP[parts[1].toLowerCase().slice(0, 3)];
      if (isNaN(day) || mon === undefined) { return null; }

      var d = new Date(sessionYear, mon, day);
      d.setHours(0, 0, 0, 0);

      var sixMonthsAgo = new Date(today);
      sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
      if (d < sixMonthsAgo) {
        d = new Date(sessionYear + 1, mon, day);
        d.setHours(0, 0, 0, 0);
      }

      return d;
    }

    // ── Tab + view control ─────────────────────────────────────────────────

    function setTabRole(role) {
      tabRole = role;
      document.getElementById("tabBtnConsultant").className =
        "role-tab-btn" + (role === "consultant" ? " active" : "");
      document.getElementById("tabBtnClient").className =
        "role-tab-btn" + (role === "client" ? " active" : "");
      renderTaskView();
    }

    function setTaskView(view) {
      taskView = view;
      document.getElementById("btnViewDate").className =
        "view-toggle-btn" + (view === "date" ? " active" : "");
      document.getElementById("btnViewType").className =
        "view-toggle-btn" + (view === "type" ? " active" : "");
      renderTaskView();
    }

    function getTabTasks() {
      if (tabRole === "consultant") {
        return allTasks.filter(function(t) { return t.type === "rafa" || t.type === "text"; });
      } else {
        return allTasks.filter(function(t) { return t.type === "client"; });
      }
    }

    function updateTabCounts() {
      var consultantTotal = allTasks.filter(function(t) { return t.type === "rafa" || t.type === "text"; }).length;
      var clientTotal     = allTasks.filter(function(t) { return t.type === "client"; }).length;

      var consultantPending = allTasks.filter(function(t) {
        return (t.type === "rafa" || t.type === "text") && !completedMap[t.key];
      }).length;
      var clientPending = allTasks.filter(function(t) {
        return t.type === "client" && !completedMap[t.key];
      }).length;

      document.getElementById("tabCountConsultant").textContent = consultantPending + "/" + consultantTotal;
      document.getElementById("tabCountClient").textContent     = clientPending + "/" + clientTotal;
    }

    function updateDoneChip(tabTasks) {
      var done  = tabTasks.filter(function(t) { return completedMap[t.key]; }).length;
      var total = tabTasks.length;
      var chip  = document.getElementById("doneChip");
      if (done === 0) {
        chip.textContent = "";
      } else {
        chip.innerHTML =
          '<span class="show-pt">' + done + ' de ' + total + ' concluída' + (done !== 1 ? 's' : '') + '</span>' +
          '<span class="show-en">' + done + ' of ' + total + ' done</span>';
      }
    }

    function renderTaskView() {
      if (taskView === "date") {
        renderByDate();
      } else {
        renderByType();
      }
      updateDoneChip(getTabTasks());
    }

    // ── Render: by date ────────────────────────────────────────────────────

    function renderByDate() {
      var container = document.getElementById("tasksContainer");
      container.innerHTML = "";

      var tabTasks = getTabTasks();

      if (tabTasks.length === 0) {
        container.appendChild(makeEmpty());
        return;
      }

      var dated   = [];
      var undated = [];
      for (var i = 0; i < tabTasks.length; i++) {
        if (tabTasks[i].dueDate) { dated.push(tabTasks[i]); }
        else                      { undated.push(tabTasks[i]); }
      }
      dated.sort(function(a, b) { return a.dueDate - b.dueDate; });
      undated.sort(function(a, b) { return a.clientName.localeCompare(b.clientName); });

      var sorted = dated.concat(undated);

      for (var j = 0; j < sorted.length; j++) {
        container.appendChild(makeTaskRow(sorted[j], tabRole === "consultant"));
      }

      container.appendChild(makeFooterNote());
    }

    // ── Render: by type ────────────────────────────────────────────────────

    function renderByType() {
      var container = document.getElementById("tasksContainer");
      container.innerHTML = "";

      var tabTasks = getTabTasks();

      if (tabTasks.length === 0) {
        container.appendChild(makeEmpty());
        return;
      }

      function sortGroup(arr) {
        var dated   = arr.filter(function(t) { return t.dueDate; });
        var undated = arr.filter(function(t) { return !t.dueDate; });
        dated.sort(function(a, b) { return a.dueDate - b.dueDate; });
        undated.sort(function(a, b) { return a.clientName.localeCompare(b.clientName); });
        return dated.concat(undated);
      }

      function appendGroup(labelPt, labelEn, tasks) {
        if (tasks.length === 0) { return; }
        var heading = document.createElement("div");
        heading.className = "group-heading";
        heading.innerHTML =
          '<span class="show-pt">' + escHtml(labelPt) + ' (' + tasks.length + ')</span>' +
          '<span class="show-en">' + escHtml(labelEn) + ' (' + tasks.length + ')</span>';
        container.appendChild(heading);
        var sorted = sortGroup(tasks);
        for (var i = 0; i < sorted.length; i++) {
          container.appendChild(makeTaskRow(sorted[i], false));
        }
      }

      if (tabRole === "consultant") {
        var rafaTasks = tabTasks.filter(function(t) { return t.type === "rafa"; });
        var textTasks = tabTasks.filter(function(t) { return t.type === "text"; });
        appendGroup("Follow-ups do Consultor", "Consultant Follow-ups", rafaTasks);
        appendGroup("Resumo de Follow-ups",     "Follow-up Summary",    textTasks);
      } else {
        appendGroup("Ações do Cliente", "Client Action Items", tabTasks);
      }

      container.appendChild(makeFooterNote());
    }

    // ── Completion toggle ──────────────────────────────────────────────────

    function toggleComplete(taskKey, sessionId, btn) {
      var newVal = !completedMap[taskKey];
      completedMap[taskKey] = newVal;
      saveLocalCompletions();

      // Update this row's visual state immediately
      var row = btn.closest ? btn.closest(".task-row") : findParentRow(btn);
      if (row) {
        if (newVal) {
          row.classList.add("done");
          btn.classList.add("checked");
        } else {
          row.classList.remove("done");
          btn.classList.remove("checked");
        }
      }

      updateTabCounts();
      updateDoneChip(getTabTasks());

      // Persist to backend (fire-and-forget, no spinner)
      var patch = {};
      patch[taskKey] = newVal;
      user_getToken().then(function(token) {
        return fetch(WORKER_URL + "/api/sessions/" + encodeURIComponent(sessionId) + "/task-completions", {
          method: "PATCH",
          headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
          body: JSON.stringify({ completions: patch })
        });
      }).catch(function() {
        // Silent fail — localStorage already holds the state
      });
    }

    // Fallback for browsers without Element.closest
    function findParentRow(el) {
      while (el && el.parentNode) {
        el = el.parentNode;
        if (el.classList && el.classList.contains("task-row")) { return el; }
      }
      return null;
    }

    // ── DOM builders ───────────────────────────────────────────────────────

    function makeTaskRow(task, showTypeTag) {
      var isDone = !!completedMap[task.key];

      var row = document.createElement("div");
      row.className = "task-row" + (isDone ? " done" : "");

      // Checkbox toggle button
      var check = document.createElement("button");
      check.className = "task-check" + (isDone ? " checked" : "");
      check.title = "Marcar como concluída / Mark complete";
      check.setAttribute("aria-label", "Toggle complete");
      // Use a self-contained closure via data attributes to avoid closure issues in loops
      (function(tKey, sId, btn) {
        btn.onclick = function() { toggleComplete(tKey, sId, btn); };
      })(task.key, task.sessionId, check);
      row.appendChild(check);

      var body = document.createElement("div");
      body.className = "task-body";

      // Task text
      var textEl = document.createElement("div");
      textEl.className = "task-text";
      textEl.textContent = task.text;
      body.appendChild(textEl);

      // Meta line
      var meta = document.createElement("div");
      meta.className = "task-meta";

      // Client name (link if has client_id)
      if (task.clientId) {
        var clientLink = document.createElement("a");
        clientLink.className = "task-client";
        clientLink.href = "client.html?id=" + encodeURIComponent(task.clientId);
        clientLink.textContent = task.clientName;
        meta.appendChild(clientLink);
      } else if (task.clientName) {
        var clientSpan = document.createElement("span");
        clientSpan.className = "task-client";
        clientSpan.style.textDecoration = "none";
        clientSpan.textContent = task.clientName;
        meta.appendChild(clientSpan);
      }

      // Session date
      if (task.sessionDate) {
        var sep = document.createElement("span");
        sep.style.cssText = "color:var(--border);font-size:11px;";
        sep.textContent = "·";
        meta.appendChild(sep);

        var sdEl = document.createElement("span");
        sdEl.className = "task-session-date";
        sdEl.innerHTML =
          '<span class="show-pt">Sessão ' + escHtml(formatDate(task.sessionDate)) + '</span>' +
          '<span class="show-en">Session ' + escHtml(formatDate(task.sessionDate)) + '</span>';
        meta.appendChild(sdEl);
      }

      // Due date pill
      if (task.due) {
        var sep2 = document.createElement("span");
        sep2.style.cssText = "color:var(--border);font-size:11px;";
        sep2.textContent = "·";
        meta.appendChild(sep2);

        var dueEl = document.createElement("span");
        dueEl.className = "task-due" + (task.overdue && !isDone ? " overdue" : "");
        dueEl.innerHTML =
          '<span class="show-pt">Prazo: ' + escHtml(task.due) + '</span>' +
          '<span class="show-en">Due: ' + escHtml(task.due) + '</span>';
        meta.appendChild(dueEl);
      }

      // Type tag (only shown in consultant tab, by-date view)
      if (showTypeTag && task.type !== "client") {
        var tagEl = document.createElement("span");
        if (task.type === "rafa") {
          tagEl.className = "task-type-tag rafa";
          tagEl.innerHTML = '<span class="show-pt">Consultor</span><span class="show-en">Consultant</span>';
        } else {
          tagEl.className = "task-type-tag";
          tagEl.innerHTML = '<span class="show-pt">Resumo</span><span class="show-en">Summary</span>';
        }
        meta.appendChild(tagEl);
      }

      body.appendChild(meta);
      row.appendChild(body);
      return row;
    }

    function makeEmpty() {
      var el = document.createElement("div");
      el.className = "tasks-empty";
      el.innerHTML =
        '<div class="tasks-empty-icon">&#10003;</div>' +
        '<span class="show-pt">Nenhuma tarefa encontrada.<br>Tarefas aparecem aqui após sessões serem resumidas.</span>' +
        '<span class="show-en">No tasks found.<br>Tasks appear here after sessions are summarized.</span>';
      return el;
    }

    function makeFooterNote() {
      var el = document.createElement("div");
      el.className = "tasks-footer-note";
      el.innerHTML =
        '<span class="show-pt">Tarefas derivadas automaticamente dos resumos de sessão.</span>' +
        '<span class="show-en">Tasks automatically derived from session summaries.</span>';
      return el;
    }

    // ── Utilities ──────────────────────────────────────────────────────────

    function formatDate(str) {
      if (!str) { return "--"; }
      var p = str.split("-");
      if (p.length !== 3) { return str; }
      return p[2] + "/" + p[1] + "/" + p[0];
    }

    function escHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // ── Bootstrap ──────────────────────────────────────────────────────────
    init();
  </script>

</body>
</html>
