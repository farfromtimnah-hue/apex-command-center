name              = "apex-api"
main              = "worker/index.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding       = "DB"
database_name = "apex-command-center"
database_id   = "03fdcf49-4a1f-43f3-a0d9-d54772074b74"

[[r2_buckets]]
binding     = "ASSETS"
bucket_name = "apex-command-center"

# These vars are placeholders only.
# Set CLAUDE_API_KEY, FIREFLIES_API_KEY, and FIREFLIES_WEBHOOK_SECRET as Worker Secrets
# via `wrangler secret put <NAME>` — never commit real keys here.
[vars]
FIREBASE_PROJECT_ID          = "apex-command-center-4b038"
