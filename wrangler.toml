name              = "apex-api"
main              = "worker/index.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding       = "DB"
database_name = "apex-command-center"
database_id   = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# These vars are placeholders only.
# Set CLAUDE_API_KEY and GRANOLA_API_KEY as Worker Secrets in the Cloudflare
# dashboard (Settings > Variables > Secret variables) — never commit real keys here.
[vars]
CLAUDE_API_KEY      = ""
GRANOLA_API_KEY     = ""
FIREBASE_PROJECT_ID = ""
